<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 데이터 분석팀 — 파이프라인 모니터</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Barlow:wght@300;400;500;600&family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap');

    :root {
      --bd: rgba(110,93,80,0.16);
      --bds: rgba(96,79,67,0.24);
      --offwhite: rgba(247,244,239,0.97);
      --lavender: rgba(237,231,245,0.96);
      --mint: rgba(225,241,236,0.96);
      --rose: rgba(247,229,235,0.96);
      --cream: rgba(247,241,226,0.96);
      --beige: rgba(239,232,223,0.97);
      --acc: #4fb799;
      --dk: #2f2b27;
      --mu: #766c63;
      --so: #9a9086;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #000; color: #fff; min-height: 100vh; padding: 32px 36px 80px; }

    /* ── HEADER ── */
    .hdr { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 32px; padding-bottom: 20px; border-bottom: 1px solid var(--bd); }
    .hdr-title { font-family: 'Barlow', sans-serif; font-size: 30px; font-weight: 300; }
    .hdr-title em { font-family: 'Instrument Serif', serif; font-style: italic; color: rgba(255,255,255,.85); }
    .hdr-right { display: flex; align-items: center; gap: 12px; }
    .dash-btn { display: inline-flex; align-items: center; gap: 7px; padding: 9px 16px; border-radius: 99px; background: var(--mint); color: #103b33; text-decoration: none; font-size: 12px; font-weight: 700; border: 1px solid rgba(16,185,129,.18); transition: transform .18s; }
    .dash-btn:hover { transform: translateY(-1px); }
    .status-pill { display: flex; align-items: center; gap: 8px; padding: 8px 16px; background: rgba(14,14,15,.9); border: 1px solid var(--bd); border-radius: 99px; font-size: 12px; color: rgba(255,255,255,.6); }
    .s-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--acc); }
    .s-dot.running { background: #F59E0B; animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

    /* ══ PIPELINE MAP ══ */
    .pipe-section { margin-bottom: 40px; }
    .pipe-eyebrow {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px; font-weight: 600; letter-spacing: .14em;
      text-transform: uppercase; color: rgba(255,255,255,.28);
      margin-bottom: 14px;
      display: flex; align-items: center; gap: 10px;
    }
    .pipe-eyebrow::after { content: ''; flex: 1; height: 1px; background: rgba(255,255,255,.07); }

    .pipe-row {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 0;
      position: relative;
    }
    /* connector line */
    .pipe-row::before {
      content: '';
      position: absolute;
      top: 38px;
      left: calc(100% / 14);
      right: calc(100% / 14);
      height: 1px;
      background: linear-gradient(90deg, rgba(96,79,67,0) 0%, rgba(96,79,67,.22) 8%, rgba(96,79,67,.22) 92%, rgba(96,79,67,0) 100%);
      pointer-events: none;
      z-index: 0;
    }

    .pipe-wrap { padding: 0 5px; position: relative; z-index: 1; }

    .pipe-card {
      border-radius: 16px;
      border: 1px solid rgba(96,79,67,.14);
      padding: 13px 12px 12px;
      cursor: pointer;
      transition: transform .2s, box-shadow .2s, border-color .2s;
      box-shadow: 0 6px 18px rgba(42,30,18,.09);
      display: flex; flex-direction: column; gap: 0;
    }
    .pipe-card:hover { transform: translateY(-3px); box-shadow: 0 14px 30px rgba(42,30,18,.14); border-color: rgba(96,79,67,.26); }
    .pipe-card.active { transform: translateY(-4px); border-color: rgba(79,183,153,.55); box-shadow: 0 0 0 2px rgba(79,183,153,.18), 0 16px 32px rgba(42,30,18,.14); }

    .pc-offwhite { background: var(--offwhite); }
    .pc-lavender  { background: var(--lavender); }
    .pc-rose      { background: var(--rose); }
    .pc-cream     { background: var(--cream); }
    .pc-mint      { background: var(--mint); }

    .pc-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 9px; }
    .pc-icon { width: 28px; height: 28px; border-radius: 8px; background: rgba(47,43,39,.09); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; color: #1a1a1a; flex-shrink: 0; }
    .pc-step { font-size: 8px; font-weight: 700; text-transform: uppercase; letter-spacing: .13em; color: var(--so); padding-top: 2px; }
    .pc-name { font-family: 'JetBrains Mono', monospace; font-size: 10.5px; font-weight: 600; color: var(--dk); margin-bottom: 7px; line-height: 1.35; }
    .pc-skill {
      display: inline-flex; align-items: center;
      font-family: 'JetBrains Mono', monospace; font-size: 9px; font-weight: 600;
      padding: 3px 8px; border-radius: 5px; margin-bottom: 9px; align-self: flex-start;
    }
    .sk-green  { color: #2a7a5e; background: rgba(79,183,153,.14); border: 1px solid rgba(79,183,153,.2); }
    .sk-muted  { color: rgba(47,43,39,.5); background: rgba(47,43,39,.06); border: 1px solid rgba(47,43,39,.08); }
    .sk-rose   { color: #8a3552; background: rgba(219,39,119,.08); border: 1px solid rgba(219,39,119,.14); }
    .pc-divider { height: 1px; background: rgba(96,79,67,.1); margin-bottom: 8px; }
    .pc-outputs { margin-top: auto; }
    .pc-out-label { font-size: 8px; font-weight: 700; text-transform: uppercase; letter-spacing: .1em; color: var(--so); margin-bottom: 5px; }
    .pc-out-item { display: flex; align-items: center; gap: 5px; font-size: 9.5px; color: var(--mu); margin-bottom: 4px; line-height: 1.3; }
    .pc-out-item::before { content: ''; width: 3px; height: 3px; border-radius: 50%; background: var(--so); flex-shrink: 0; }

    .pipe-arrow { position: absolute; right: -3px; top: 36px; z-index: 2; color: rgba(96,79,67,.35); font-size: 10px; pointer-events: none; }
    .pipe-wrap:last-child .pipe-arrow { display: none; }

    /* ══ OUTPUT GALLERY ══ */
    .gallery-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px; font-weight: 600; letter-spacing: .14em;
      text-transform: uppercase; color: rgba(255,255,255,.28);
      margin-bottom: 18px;
      display: flex; align-items: center; gap: 10px;
    }
    .gallery-label::after { content: ''; flex: 1; height: 1px; background: rgba(255,255,255,.07); }

    .gallery { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }

    /* ══ OUTPUT CARD (webinar-guide style) ══ */
    .out-card {
      border-radius: 22px;
      border: 1px solid var(--bd);
      overflow: hidden;
      box-shadow: 0 8px 28px rgba(42,30,18,.08);
      scroll-margin-top: 28px;
      transition: box-shadow .2s, transform .2s, border-color .2s;
    }
    .out-card:hover { transform: translateY(-2px); box-shadow: 0 16px 40px rgba(42,30,18,.12); }
    .out-card.ring { border-color: var(--acc); box-shadow: 0 0 0 2px var(--acc), 0 16px 40px rgba(42,30,18,.14); }

    .oc-s1 { background: var(--offwhite); }
    .oc-s2 { background: var(--lavender); }
    .oc-s3 { background: var(--rose); }
    .oc-s4 { background: var(--cream); }
    .oc-s5 { background: var(--mint); }
    .oc-s6 { background: var(--beige); }
    .oc-s7 { background: var(--mint); }

    .oc-top { padding: 22px 22px 16px; }
    .oc-step { font-family: 'JetBrains Mono', monospace; font-size: 10px; font-weight: 600; letter-spacing: .12em; text-transform: uppercase; color: var(--so); margin-bottom: 10px; }
    .oc-icon { width: 40px; height: 40px; border-radius: 12px; background: rgba(47,43,39,.09); display: flex; align-items: center; justify-content: center; font-size: 17px; margin-bottom: 10px; }
    .oc-name { font-family: 'JetBrains Mono', monospace; font-size: 13px; font-weight: 600; color: var(--dk); margin-bottom: 4px; }
    .oc-meta { font-size: 11px; color: var(--mu); line-height: 1.55; }
    .oc-divider { height: 1px; background: var(--bd); }

    .oc-body { padding: 16px 20px 20px; }
    .ai-hdr { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
    .ai-ava { width: 24px; height: 24px; border-radius: 7px; background: rgba(79,183,153,.18); display: flex; align-items: center; justify-content: center; font-size: 11px; }
    .ai-nm { font-family: 'JetBrains Mono', monospace; font-size: 10px; font-weight: 600; color: var(--dk); }
    .ai-bg { margin-left: auto; font-size: 10px; padding: 2px 9px; background: rgba(47,43,39,.08); border: 1px solid rgba(47,43,39,.1); border-radius: 99px; font-weight: 700; color: var(--mu); }

    /* content atoms */
    .r-text { font-size: 12px; color: var(--dk); line-height: 1.7; margin-bottom: 10px; }
    .r-text strong { font-weight: 700; }
    .r-find { display: flex; gap: 9px; align-items: flex-start; background: rgba(47,43,39,.05); border: 1px solid rgba(96,79,67,.1); border-radius: 9px; padding: 9px 11px; margin-bottom: 7px; }
    .r-fn { width: 20px; height: 20px; border-radius: 50%; background: rgba(79,183,153,.14); color: #218d72; display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 700; flex-shrink: 0; font-family: 'JetBrains Mono', monospace; margin-top: 1px; }
    .r-ft { font-size: 11.5px; color: var(--dk); line-height: 1.6; }
    .r-ft strong { font-weight: 700; }
    .r-tbl { width: 100%; border-collapse: collapse; font-size: 11px; margin-bottom: 10px; }
    .r-tbl th { background: rgba(47,43,39,.09); color: var(--dk); font-weight: 700; font-size: 9px; text-transform: uppercase; letter-spacing: .05em; padding: 7px 10px; text-align: left; }
    .r-tbl td { padding: 7px 10px; color: var(--dk); border-top: 1px solid rgba(96,79,67,.08); vertical-align: top; line-height: 1.5; }
    .kpi-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(60px, 1fr)); gap: 7px; margin-bottom: 10px; }
    .kpi-box { background: rgba(47,43,39,.06); border: 1px solid rgba(96,79,67,.08); border-radius: 10px; padding: 9px; text-align: center; }
    .kpi-v { font-family: 'Barlow', sans-serif; font-size: 17px; font-weight: 600; color: var(--dk); margin-bottom: 3px; }
    .kpi-l { font-size: 9px; color: var(--mu); text-transform: uppercase; letter-spacing: .06em; }
    .sec-list { display: flex; flex-direction: column; gap: 7px; }
    .sec-row { padding: 9px 11px; border-radius: 9px; border: 1px solid rgba(96,79,67,.1); background: rgba(47,43,39,.04); }
    .sec-h { font-size: 9px; font-weight: 700; color: var(--dk); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 3px; }
    .sec-b { font-size: 11.5px; color: #5d534b; line-height: 1.6; }
    .q-list { display: flex; flex-direction: column; gap: 7px; }
    .q-item { display: flex; gap: 10px; align-items: flex-start; background: rgba(47,43,39,.04); border: 1px solid rgba(96,79,67,.1); border-radius: 9px; padding: 10px; }
    .q-num { width: 22px; height: 22px; background: var(--rose); border-radius: 7px; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; color: #A13D5C; flex-shrink: 0; }
    .q-txt { font-size: 11.5px; color: #5d534b; line-height: 1.5; }
    .act-list { display: flex; flex-direction: column; gap: 7px; }
    .act-row { background: rgba(47,43,39,.04); border: 1px solid rgba(96,79,67,.1); border-radius: 9px; padding: 11px; }
    .act-top { display: flex; justify-content: space-between; margin-bottom: 5px; }
    .act-p { font-size: 9px; font-weight: 700; color: #0D9488; text-transform: uppercase; letter-spacing: .08em; }
    .act-own { font-size: 10px; color: var(--mu); }
    .act-ttl { font-size: 12px; font-weight: 600; color: var(--dk); margin-bottom: 4px; line-height: 1.4; }
    .act-imp { font-size: 10.5px; color: #4a9f87; margin-bottom: 4px; }
    .act-why { font-size: 11px; color: #5d534b; line-height: 1.6; }
    .rout-box { background: rgba(47,43,39,.05); border: 1px solid rgba(96,79,67,.1); border-radius: 10px; padding: 11px; margin-bottom: 10px; }
    .rout-lbl { font-size: 9px; font-weight: 700; color: var(--so); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 8px; }
    .r-sec-num { font-size: 11px; font-weight: 700; color: var(--dk); margin: 12px 0 6px; letter-spacing: .01em; }
    .tag-ok  { display: inline-block; padding: 2px 7px; border-radius: 5px; font-size: 10px; font-weight: 700; background: rgba(53,201,149,.14); color: #1a7a5a; border: 1px solid rgba(53,201,149,.2); }
    .tag-warn{ display: inline-block; padding: 2px 7px; border-radius: 5px; font-size: 10px; font-weight: 700; background: rgba(239,176,93,.14); color: #8a5e1e; border: 1px solid rgba(239,176,93,.2); }
    .tag-bad { display: inline-block; padding: 2px 7px; border-radius: 5px; font-size: 10px; font-weight: 700; background: rgba(239,125,134,.14); color: #8a2233; border: 1px solid rgba(239,125,134,.2); }

    @media (max-width: 1100px) {
      .pipe-row { grid-template-columns: repeat(4, 1fr); }
      .gallery { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 720px) {
      .pipe-row { grid-template-columns: repeat(2, 1fr); }
      .gallery { grid-template-columns: 1fr; }
      body { padding: 20px 16px 60px; }
    }
  </style>
</head>
<body>

<!-- HEADER -->
<header class="hdr">
  <div>
    <div class="hdr-title">AI 데이터 분석팀 <em>· 파이프라인 모니터</em></div>
  </div>
  <div class="hdr-right">
    <a class="dash-btn" href="./analysis-lab.html">AI 분석 실험실 →</a>
    <a class="dash-btn" href="./runs/latest/outputs/06_dashboard.html">대시보드 열기 →</a>
    <div class="status-pill">
      <div class="s-dot" id="sDot"></div>
      <span id="sText">로딩 중…</span>
    </div>
  </div>
</header>

<!-- PIPELINE MAP -->
<div class="pipe-section">
  <div class="pipe-eyebrow">파이프라인 — 역할 카드를 클릭하면 결과물로 이동합니다</div>
  <div class="pipe-row" id="pipeRow"></div>
</div>

<!-- OUTPUT GALLERY -->
<div class="gallery-label">산출물</div>
<div class="gallery" id="gallery"></div>

<script>
/* ── ROLE DATA ── */
const ROLES = [
  {
    id:'data-ingestion', step:'STEP 01', name:'@data-ingestion', icon:'⊕',
    color:'pc-offwhite', ocColor:'oc-s1',
    skill:'direct execution', skillType:'sk-muted',
    outputs:['dataset_profile.md','sample.csv 확인'],
    badge:'분석 완료', meta:'24행 · 12컬럼 · 결측치 0건',
    content:`
      <div class="r-text">업로드된 데이터(24행, 12컬럼)를 직접 분석했어요. 결측치 요약 + 이상치 포인트 + 전처리 전략을 정리해드릴게요.</div>

      <div class="r-sec-num">1. 결측치 확인</div>
      <table class="r-tbl">
        <tr><th>컬럼</th><th>결측치</th><th>결측 비율</th><th>판정</th></tr>
        <tr><td>모든 컬럼</td><td>0건</td><td>0%</td><td><span class="tag-ok">정상</span></td></tr>
      </table>
      <div class="r-find"><div class="r-fn">✓</div><div class="r-ft">결측치 0건. <strong>전체 12개 컬럼 모두 완전한 데이터.</strong> 전처리 없이 바로 분석 진행 가능.</div></div>

      <div class="r-sec-num">2. 이상치 확인</div>
      <table class="r-tbl">
        <tr><th>컬럼</th><th>평균</th><th>최솟값</th><th>최댓값</th><th>이상치 가능성</th></tr>
        <tr><td>revenue</td><td>$16,547</td><td>$2,100</td><td>$48,300</td><td><span class="tag-ok">정상 분포</span></td></tr>
        <tr><td>discount</td><td>15.2%</td><td>5%</td><td>35%</td><td><span class="tag-warn">35% 2건 — 검토 필요</span></td></tr>
        <tr><td>visitors</td><td>1,284</td><td>420</td><td>2,210</td><td><span class="tag-ok">정상 분포</span></td></tr>
      </table>
      <div class="r-find"><div class="r-fn">!</div><div class="r-ft">discount 35% 2건 — IQR 상한(27.5%) 초과. <strong>Furniture 카테고리에서만 발생.</strong> 영업 담당자 확인 후 캡핑 또는 제거 권장.</div></div>

      <div class="r-sec-num">3. 전처리 전략 요약</div>
      <div class="r-find"><div class="r-fn">1</div><div class="r-ft">discount 이상치 2건 → <strong>IQR 캡핑(27.5%)으로 처리</strong> (제거 아님 — 데이터 24행이라 제거 시 손실 과다)</div></div>
      <div class="r-find"><div class="r-fn">2</div><div class="r-ft">profit 컬럼 없음 → <strong>파생 컬럼 추가: profit = revenue − cost</strong></div></div>
      <div class="r-find"><div class="r-fn">3</div><div class="r-ft">test_group 컬럼 (A/B) → <strong>실험 분석용 그룹 변수로 보존</strong>. 같은 날짜·조건에서 A/B 각 1건씩 페어 구조.</div></div>`
  },
  {
    id:'eda', step:'STEP 02', name:'@eda', icon:'◇',
    color:'pc-lavender', ocColor:'oc-s2',
    skill:'/eda skill', skillType:'sk-green',
    outputs:['eda_report.md','핵심 질문 3개'],
    badge:'완료', meta:'Technology 52% 집중 · Furniture 마진 위험',
    content:`
      <div class="rout-box">
        <div class="rout-lbl">핵심 관점</div>
        <div class="r-find"><div class="r-fn">i</div><div class="r-ft">발견 3개 모두 액션과 연결됨. 탐색이 아니라 결정의 근거.</div></div>
        <div class="r-find"><div class="r-fn">i</div><div class="r-ft">Furniture와 Technology는 서로 다른 문제. 묶어서 보면 오해 생김.</div></div>
      </div>
      <div class="rout-box">
        <div class="rout-lbl">핵심 발견</div>
        <div class="r-find"><div class="r-fn">1</div><div class="r-ft"><strong>Technology가 전체 매출의 52%($207K).</strong> 단일 카테고리 집중 — 포트폴리오 리스크.</div></div>
        <div class="r-find"><div class="r-fn">2</div><div class="r-ft"><strong>Furniture 마진 10.7%</strong> = Technology(35%)의 1/3. 할인율 평균 17.7%가 직접 원인.</div></div>
        <div class="r-find"><div class="r-fn">3</div><div class="r-ft"><strong>3월 매출 -31%의 실체는 Technology -77%.</strong> 나머지 카테고리는 오히려 증가.</div></div>
      </div>`
  },
  {
    id:'problem', step:'STEP 03', name:'@problem', icon:'+',
    color:'pc-rose', ocColor:'oc-s3',
    skill:'→ /eda 결과 정제', skillType:'sk-muted',
    outputs:['problem_definition.md','분석 질문 3개'],
    badge:'3개 확정', meta:'수익성 / 실험 유의성 / 매출 급락',
    content:`
      <div class="rout-box">
        <div class="rout-lbl">핵심 관점</div>
        <div class="r-find"><div class="r-fn">i</div><div class="r-ft">각 질문은 가격 · 예산 · 채널 중 하나의 결정으로 이어져야 함.</div></div>
        <div class="r-find"><div class="r-fn">i</div><div class="r-ft">질문을 먼저 확정해야 분석 방향이 흔들리지 않음.</div></div>
      </div>
      <div class="q-list">

/* ── RENDER PIPELINE ── */
function renderPipeline() {
  document.getElementById('pipeRow').innerHTML = ROLES.map((r, i) => `
    <div class="pipe-wrap">
      <div class="pipe-card ${r.color}" id="pc-${r.id}" onclick="jumpTo(${i})">
        <div class="pc-top">
          <div class="pc-icon">${r.icon}</div>
          <div class="pc-step">${r.step}</div>
        </div>
        <div class="pc-name">${r.name}</div>
        <div class="pc-skill ${r.skillType}">${r.skill}</div>
        <div class="pc-divider"></div>
        <div class="pc-outputs">
          <div class="pc-out-label">산출물</div>
          ${r.outputs.map(o => `<div class="pc-out-item">${o}</div>`).join('')}
        </div>
      </div>
      ${i < ROLES.length - 1 ? '<div class="pipe-arrow">→</div>' : ''}
    </div>
  `).join('');
}

/* ── RENDER GALLERY ── */
function renderGallery() {
  document.getElementById('gallery').innerHTML = ROLES.map((r, i) => `
    <div class="out-card ${r.ocColor}" id="oc-${i}">
      <div class="oc-top">
        <div class="oc-step">${r.step} · ${r.name}</div>
        <div class="oc-icon">${r.icon}</div>
        <div class="oc-name">${r.name}</div>
        <div class="oc-meta">${r.meta}</div>
      </div>
      <div class="oc-divider"></div>
      <div class="oc-body">
        <div class="ai-hdr">
          <div class="ai-ava">✦</div>
          <span class="ai-nm">AI 분석 결과</span>
          <span class="ai-bg">${r.badge}</span>
        </div>
        ${r.content}
      </div>
    </div>
  `).join('');
}

/* ── JUMP ── */
function jumpTo(idx) {
  // highlight pipe card
  document.querySelectorAll('.pipe-card').forEach((c, i) => c.classList.toggle('active', i === idx));

  // scroll to output card
  const card = document.getElementById('oc-' + idx);
  if (!card) return;
  card.scrollIntoView({ behavior: 'smooth', block: 'start' });

  // flash ring
  document.querySelectorAll('.out-card').forEach(c => c.classList.remove('ring'));
  card.classList.add('ring');
  setTimeout(() => card.classList.remove('ring'), 1600);
}

/* ── STATUS ── */
async function loadStatus() {
  let status = {
    overall_status: 'completed',
    run_id: '20260408-001',
    finished_at: '2026-04-08T10:08:32+00:00'
  };
  try {
    const r = await fetch('./runs/latest/status.json?t=' + Date.now());
    if (r.ok) status = await r.json();
  } catch(e) {}

  const done = status.overall_status === 'completed';
  document.getElementById('sDot').className = 's-dot' + (done ? '' : ' running');
  document.getElementById('sText').textContent = done
    ? `완료 · ${new Date(status.finished_at).toLocaleString('ko-KR', {month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'})}`
    : '실행 중…';
}

renderPipeline();
renderGallery();
loadStatus();
setInterval(loadStatus, 10000);
</script>
