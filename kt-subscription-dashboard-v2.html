<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KT IT기술부문 — 구독 서비스 모니터링 v2</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Pretendard:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* ─── DESIGN TOKENS ──────────────────────────────── */
:root {
  --c-bg: #F5F5F5;
  --c-surface: #FFFFFF;
  --c-surface-alt: #F4F4F4;
  --c-border: #E0E0E0;
  --c-border-sub: #F0F0F0;
  --c-text: #111111;
  --c-text-sub: #333333;
  --c-text-dim: #888888;
  --c-text-muted: #AAAAAA;
  --c-accent: #E8000D;
  --c-positive: #1e6640;
  --c-hover: #F8F8F8;
  --c-border-w: 1px;
}
body {
  font-family: 'Pretendard', 'Inter', -apple-system, sans-serif;
  background: var(--c-bg);
  color: var(--c-text);
  display: flex;
  height: 100vh;
  overflow: hidden;
  font-size: 14px;
}

/* ─── SIDEBAR ──────────────────────────────────── */
#sidebar {
  width: 200px; min-width: 200px;
  background: var(--c-surface);
  border-right: 1px solid var(--c-border);
  display: flex; flex-direction: column;
  overflow-y: auto;
}
.sb-logo { padding: 20px 20px 14px; border-bottom: 1px solid var(--c-border-sub); }
.sb-logo svg { display: block; }
.kt-logo-mark { fill: var(--c-text); }
.kt-logo-accent { fill: #ed1c24; }
.sb-filters { padding: 16px 16px 8px; border-bottom: 1px solid var(--c-border-sub); }
.sb-filter-label {
  font-size: 11px; color: var(--c-text-dim); font-weight: 600;
  letter-spacing: 0.05em; margin-bottom: 5px; text-transform: uppercase;
}
.sb-select {
  width: 100%; border: 1px solid var(--c-border); padding: 5px 8px;
  font-size: 12px; color: var(--c-text-sub); background: var(--c-surface);
  margin-bottom: 12px; cursor: pointer; font-family: inherit; appearance: none;
  background-image: url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L5 5L9 1' stroke='%23888' stroke-width='1.5' stroke-linecap='round'/%3E%3C/svg%3E");
  background-repeat: no-repeat; background-position: right 8px center; padding-right: 24px;
}
.sb-nav { padding: 12px 0; flex: 1; }
.sb-nav-item {
  display: flex; align-items: center; gap: 8px; padding: 9px 20px;
  font-size: 13px; color: var(--c-text-dim); cursor: pointer;
  transition: background 0.12s; user-select: none;
}
.sb-nav-item:hover { background: var(--c-hover); color: var(--c-text); }
.sb-nav-item.active { color: var(--c-accent); font-weight: 600; background: var(--c-hover); }
.sb-nav-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--c-border); flex-shrink: 0; }
.sb-nav-item.active .sb-nav-dot { background: var(--c-accent); }

/* ─── THEME SWITCHER ───────────────────────────── */
.sb-themes { padding: 10px 20px 12px; border-top: 1px solid var(--c-border-sub); }
.sb-themes-label {
  font-size: 10px; color: var(--c-text-dim); font-weight: 600;
  letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 7px;
}
.sb-themes-grid { display: flex; flex-wrap: wrap; gap: 4px; }
.theme-swatch {
  width: 14px; height: 14px; cursor: pointer;
  border: 1px solid transparent; transition: transform 0.1s, border-color 0.1s;
  flex-shrink: 0;
}
.theme-swatch:hover { transform: scale(1.3); }
.theme-swatch.active { border-color: var(--c-text) !important; }
.sb-footer {
  padding: 10px 20px 14px; font-size: 11px;
  color: var(--c-text-muted); border-top: 1px solid var(--c-border-sub); line-height: 1.6;
}

/* ─── MAIN CONTENT ─────────────────────────────── */
#main { flex: 1; overflow-y: auto; background: var(--c-bg); }
.page-header {
  background: var(--c-surface); border-bottom: 1px solid var(--c-border); padding: 18px 32px 14px;
}
.page-title { font-size: 22px; font-weight: 600; color: var(--c-text); }
.page-subtitle { font-size: 12px; color: var(--c-text-dim); margin-top: 3px; }
.page-refresh { font-size: 11px; color: var(--c-text-muted); }
.page-header-top { display: flex; justify-content: space-between; align-items: flex-start; }
.page-body { padding: 20px 32px; }

/* ─── KPI ROW ──────────────────────────────────── */
.kpi-row {
  display: flex; gap: 0; background: var(--c-surface);
  border: var(--c-border-w) solid var(--c-border); margin-bottom: 20px; overflow: hidden;
}
.kpi-card { flex: 1; padding: 18px 24px; border-right: 1px solid var(--c-border); }
.kpi-card:last-child { border-right: none; }
.kpi-label { font-size: 12px; color: var(--c-text-dim); margin-bottom: 6px; }
.kpi-value { font-size: 26px; font-weight: 700; color: var(--c-text); letter-spacing: -0.5px; }
.kpi-delta { font-size: 13px; margin-top: 4px; display: flex; align-items: center; gap: 4px; }
.kpi-delta.up { color: var(--c-accent); }
.kpi-delta.down { color: var(--c-positive); }
.kpi-sub { font-size: 11px; color: var(--c-text-muted); margin-top: 3px; }
.kpi-main { background: var(--c-surface-alt); flex: 1.4; padding: 18px 24px; }
.kpi-main .kpi-label { font-size: 14px; font-weight: 600; color: var(--c-text-sub); }
.kpi-main .kpi-value { font-size: 32px; }

/* ─── CHART CARD ───────────────────────────────── */
.chart-card {
  background: var(--c-surface);
  border: var(--c-border-w) solid var(--c-border); padding: 18px 20px; overflow: hidden;
}
.chart-title { font-size: 13px; font-weight: 600; color: var(--c-text); margin-bottom: 4px; }
.chart-subtitle { font-size: 11px; color: var(--c-text-muted); margin-bottom: 12px; }
.chart-insight { font-size:11px; color:var(--c-text-sub); background:var(--c-hover); border-left:2px solid var(--c-accent); padding:5px 9px; margin:2px 0 10px; border-radius:0 3px 3px 0; line-height:1.5; }
.chart-grid { display: grid; gap: 16px; margin-bottom: 20px; }
.chart-grid.col-2 { grid-template-columns: 1fr 1fr; }
.chart-grid.col-3 { grid-template-columns: 1fr 1fr 1fr; }
.chart-grid.col-1-2 { grid-template-columns: 1.1fr 2fr; }

/* ─── SECTION DIVIDER ──────────────────────────── */
.section-divider { display: flex; align-items: center; gap: 16px; margin: 24px 0 16px; }
.section-divider::before, .section-divider::after { content:''; flex:1; height:1px; background:var(--c-border); }
.section-divider-text { font-size: 14px; font-weight: 700; color: var(--c-text-sub); white-space: nowrap; }

/* ─── TREND CARDS ──────────────────────────────── */
.trend-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px; }
.trend-card {
  background: var(--c-surface); border: var(--c-border-w) solid var(--c-border); padding: 16px 20px;
}
.trend-card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
.trend-card-title { font-size: 16px; font-weight: 700; }
.trend-more { font-size: 11px; color: var(--c-accent); cursor: pointer; display: flex; align-items: center; gap: 4px; }
.trend-items { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.trend-item .trend-item-label { font-size: 12px; color: var(--c-text-sub); margin-bottom: 3px; }
.trend-item .trend-item-sub { font-size: 11px; color: var(--c-text-muted); margin-bottom: 6px; }
.trend-item .trend-item-val { font-size: 20px; font-weight: 700; color: var(--c-text); }
.trend-item .trend-item-delta { font-size: 12px; margin-top: 2px; }
.trend-item .trend-item-delta.up { color: var(--c-accent); }
.trend-item .trend-item-delta.down { color: var(--c-positive); }

/* ─── CHART FILTER ─────────────────────────────── */
.chart-filter-row { display: flex; justify-content: flex-end; align-items: center; gap: 12px; margin-bottom: 8px; }
.chart-filter-label { font-size: 12px; color: var(--c-text-dim); }
.chart-filter-select {
  border: 1px solid var(--c-border); padding: 4px 20px 4px 8px; font-size: 12px;
  color: var(--c-text-sub); background: var(--c-surface); cursor: pointer; font-family: inherit; appearance: none;
  background-image: url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L5 5L9 1' stroke='%23888' stroke-width='1.5' stroke-linecap='round'/%3E%3C/svg%3E");
  background-repeat: no-repeat; background-position: right 6px center;
}

/* ─── LEGEND ───────────────────────────────────── */
.legend { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 8px; font-size: 11px; color: var(--c-text-sub); }
.legend-item { display: flex; align-items: center; gap: 5px; }
.legend-dot { width: 8px; height: 8px; flex-shrink: 0; }
.sim-slider { width:100%; height:3px; -webkit-appearance:none; appearance:none; outline:none; background:var(--c-border); border-radius:2px; cursor:pointer; }
.sim-slider::-webkit-slider-thumb { -webkit-appearance:none; width:13px; height:13px; border-radius:50%; background:var(--c-accent); cursor:pointer; box-shadow:0 0 0 2px rgba(0,0,0,0.12); }
.sim-slider::-moz-range-thumb { width:13px; height:13px; border-radius:50%; background:var(--c-accent); cursor:pointer; border:none; }
.sim-btn { padding:5px 12px; font-size:11px; background:var(--c-hover); border:1px solid var(--c-border); border-radius:4px; cursor:pointer; color:var(--c-text); }

/* ─── TABLE ────────────────────────────────────── */
.data-table { width: 100%; border-collapse: collapse; font-size: 12px; margin-top: 8px; }
.data-table th {
  background: var(--c-surface-alt); color: var(--c-text-dim); font-weight: 600; text-align: left;
  padding: 8px 12px; border-bottom: 1px solid var(--c-border);
  font-size: 11px; letter-spacing: 0.04em; text-transform: uppercase;
}
.data-table td { padding: 9px 12px; border-bottom: 1px solid var(--c-border-sub); color: var(--c-text-sub); }
.data-table tr:last-child td { border-bottom: none; }
.data-table tr:hover td { background: var(--c-hover); }
.badge { display: inline-block; padding: 2px 8px; font-size: 11px; font-weight: 500; }
.badge-ai   { background: var(--c-surface-alt); color: var(--c-text); font-weight: 600; }
.badge-cloud { background: var(--c-surface-alt); color: var(--c-text-sub); }
.badge-dev  { background: var(--c-surface-alt); color: var(--c-text-sub); }
.badge-collab { background: var(--c-surface-alt); color: var(--c-text-sub); }
.badge-bi   { background: var(--c-surface-alt); color: var(--c-text-sub); }

svg text { font-family: 'Inter', 'Pretendard', sans-serif; }

/* ═══ CONCEPT LAYERS ════════════════════════════════════════════
   5 visual concepts overlay on top of the 10 color themes.
   flat (default) → no extra rules needed.
   ═══════════════════════════════════════════════════════════════ */

/* ─── CONCEPT: BRUTALIST ───────────────────────── */
body[data-concept="brutalist"] #sidebar { border-right-width: 2px; }
body[data-concept="brutalist"] .sb-logo,
body[data-concept="brutalist"] .sb-filters { border-bottom-width: 2px; }
body[data-concept="brutalist"] .page-header { border-bottom-width: 2px; }
body[data-concept="brutalist"] .page-title {
  font-size: 19px; font-weight: 800;
  text-transform: uppercase; letter-spacing: 0.06em;
}
body[data-concept="brutalist"] .kpi-row { border-width: 2px; }
body[data-concept="brutalist"] .kpi-card { border-right-width: 2px; }
body[data-concept="brutalist"] .kpi-label {
  text-transform: uppercase; letter-spacing: 0.1em;
  font-size: 10px; font-weight: 800;
}
body[data-concept="brutalist"] .kpi-value {
  font-family: 'Courier New', monospace;
  font-size: 30px; letter-spacing: -1px;
}
body[data-concept="brutalist"] .kpi-main .kpi-value { font-size: 38px; }
body[data-concept="brutalist"] .chart-card { border-width: 2px; }
body[data-concept="brutalist"] .trend-card { border-width: 2px; }
body[data-concept="brutalist"] .chart-title {
  text-transform: uppercase; letter-spacing: 0.1em;
  font-size: 11px; font-weight: 800;
}
body[data-concept="brutalist"] .section-divider::before,
body[data-concept="brutalist"] .section-divider::after { height: 2px; }
body[data-concept="brutalist"] .section-divider-text {
  font-size: 12px; text-transform: uppercase; letter-spacing: 0.1em; font-weight: 800;
}
body[data-concept="brutalist"] .data-table th {
  border-bottom-width: 2px; font-size: 10px; font-weight: 800; letter-spacing: 0.1em;
}
body[data-concept="brutalist"] .sb-nav-item {
  font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; font-size: 11px;
}
body[data-concept="brutalist"] .trend-item .trend-item-val {
  font-family: 'Courier New', monospace;
}

/* ─── CONCEPT: AIRY (weather-app feel) ─────────── */
body[data-concept="airy"] #main { background: var(--c-bg); }
body[data-concept="airy"] .page-header {
  background: transparent; border-bottom: 1px solid var(--c-border-sub);
  padding: 30px 48px 24px;
}
body[data-concept="airy"] .page-title {
  font-size: 30px; font-weight: 300; letter-spacing: -0.8px;
}
body[data-concept="airy"] .page-subtitle { font-size: 13px; margin-top: 5px; }
body[data-concept="airy"] .page-body { padding: 32px 48px; }
body[data-concept="airy"] .kpi-row {
  border: none; background: transparent; gap: 16px; margin-bottom: 28px;
}
body[data-concept="airy"] .kpi-card {
  border: 1px solid var(--c-border-sub); background: var(--c-surface);
  box-shadow: 0 2px 12px rgba(0,0,0,0.045); padding: 26px 30px;
  border-right: 1px solid var(--c-border-sub);
}
body[data-concept="airy"] .kpi-main {
  box-shadow: 0 2px 12px rgba(0,0,0,0.045);
  border: 1px solid var(--c-border-sub); padding: 28px 34px;
}
body[data-concept="airy"] .kpi-label {
  font-size: 13px; font-weight: 400; letter-spacing: 0; margin-bottom: 8px;
}
body[data-concept="airy"] .kpi-value {
  font-size: 44px; font-weight: 300; letter-spacing: -2px;
}
body[data-concept="airy"] .kpi-main .kpi-value {
  font-size: 54px; letter-spacing: -3px;
}
body[data-concept="airy"] .kpi-delta { font-size: 14px; margin-top: 6px; }
body[data-concept="airy"] .chart-card {
  border: 1px solid var(--c-border-sub);
  box-shadow: 0 2px 12px rgba(0,0,0,0.045); padding: 26px 30px;
}
body[data-concept="airy"] .chart-title { font-size: 15px; font-weight: 500; }
body[data-concept="airy"] .chart-grid { gap: 20px; margin-bottom: 24px; }
body[data-concept="airy"] .trend-card {
  border: 1px solid var(--c-border-sub);
  box-shadow: 0 2px 12px rgba(0,0,0,0.045); padding: 26px 28px;
}
body[data-concept="airy"] .trend-grid { gap: 20px; margin-bottom: 28px; }
body[data-concept="airy"] .trend-item .trend-item-val {
  font-size: 28px; font-weight: 300; letter-spacing: -1px;
}
body[data-concept="airy"] .section-divider { margin: 40px 0 28px; }
body[data-concept="airy"] .section-divider-text { font-size: 13px; font-weight: 400; }
body[data-concept="airy"] .section-divider::before,
body[data-concept="airy"] .section-divider::after { background: var(--c-border-sub); }

/* ─── CONCEPT: TERMINAL ─────────────────────────── */
body[data-concept="terminal"] *,
body[data-concept="terminal"] svg text {
  font-family: 'Courier New', 'Menlo', monospace !important;
}
body[data-concept="terminal"] .page-header { padding: 14px 24px 12px; }
body[data-concept="terminal"] .page-title {
  font-size: 14px; font-weight: 400;
  text-transform: uppercase; letter-spacing: 0.06em;
}
body[data-concept="terminal"] .page-title::before { content: '> '; color: var(--c-accent); }
body[data-concept="terminal"] .page-subtitle { font-size: 11px; }
body[data-concept="terminal"] .page-body { padding: 14px 24px; }
body[data-concept="terminal"] .kpi-row { margin-bottom: 14px; }
body[data-concept="terminal"] .kpi-card { padding: 14px 18px; }
body[data-concept="terminal"] .kpi-main { padding: 14px 20px; }
body[data-concept="terminal"] .kpi-label { font-size: 11px; }
body[data-concept="terminal"] .kpi-label::before { content: '# '; opacity: 0.45; }
body[data-concept="terminal"] .kpi-value {
  font-size: 26px; letter-spacing: -1px;
}
body[data-concept="terminal"] .kpi-main .kpi-value { font-size: 32px; }
body[data-concept="terminal"] .chart-card { padding: 14px 16px; }
body[data-concept="terminal"] .chart-title::before { content: '$ '; color: var(--c-accent); }
body[data-concept="terminal"] .chart-title { font-size: 12px; }
body[data-concept="terminal"] .chart-grid { gap: 10px; margin-bottom: 14px; }
body[data-concept="terminal"] .section-divider { margin: 18px 0 12px; }
body[data-concept="terminal"] .section-divider::before,
body[data-concept="terminal"] .section-divider::after {
  background: none; border-top: 1px dashed var(--c-border); height: 0;
}
body[data-concept="terminal"] .section-divider-text {
  font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em;
}
body[data-concept="terminal"] .trend-card { padding: 10px 14px; }
body[data-concept="terminal"] .trend-grid { gap: 10px; margin-bottom: 14px; }
body[data-concept="terminal"] .trend-item .trend-item-val { font-size: 18px; }
body[data-concept="terminal"] .data-table td { padding: 7px 12px; }

/* ─── CONCEPT: EDITORIAL ────────────────────────── */
body[data-concept="editorial"] .page-header {
  background: transparent; border-bottom: 2px solid var(--c-text);
  padding: 26px 44px 20px;
}
body[data-concept="editorial"] .page-title {
  font-size: 32px; font-weight: 800; letter-spacing: -1.5px;
}
body[data-concept="editorial"] .page-subtitle {
  font-size: 11px; text-transform: uppercase;
  letter-spacing: 0.1em; margin-top: 8px;
}
body[data-concept="editorial"] .page-body { padding: 30px 44px; }
body[data-concept="editorial"] .kpi-row {
  border: none; border-top: 3px solid var(--c-text);
  background: transparent; margin-bottom: 0;
}
body[data-concept="editorial"] .kpi-card {
  background: transparent; padding: 22px 28px;
}
body[data-concept="editorial"] .kpi-main {
  background: transparent; padding: 22px 32px;
}
body[data-concept="editorial"] .kpi-label {
  font-size: 10px; text-transform: uppercase;
  letter-spacing: 0.12em; font-weight: 700;
}
body[data-concept="editorial"] .kpi-value {
  font-size: 38px; font-weight: 300; letter-spacing: -2px;
}
body[data-concept="editorial"] .kpi-main .kpi-value {
  font-size: 48px; letter-spacing: -3px;
}
body[data-concept="editorial"] .chart-card {
  border: none; border-top: 1px solid var(--c-border);
  background: transparent; padding: 20px 0 24px;
}
body[data-concept="editorial"] .chart-title {
  font-size: 17px; font-weight: 700; letter-spacing: -0.3px;
}
body[data-concept="editorial"] .chart-grid { gap: 32px; margin-bottom: 24px; }
body[data-concept="editorial"] .trend-card {
  border: none; border-top: 1px solid var(--c-border);
  background: transparent; padding: 18px 0;
}
body[data-concept="editorial"] .trend-grid { gap: 0; column-gap: 32px; margin-bottom: 24px; }
body[data-concept="editorial"] .trend-item .trend-item-val {
  font-size: 28px; font-weight: 300; letter-spacing: -1px;
}
body[data-concept="editorial"] .section-divider {
  margin: 36px 0 20px; justify-content: flex-start;
}
body[data-concept="editorial"] .section-divider::before { display: none; }
body[data-concept="editorial"] .section-divider::after { display: none; }
body[data-concept="editorial"] .section-divider-text {
  font-size: 10px; text-transform: uppercase;
  letter-spacing: 0.14em; font-weight: 700;
  color: var(--c-text-dim); padding-bottom: 0;
}
body[data-concept="editorial"] .data-table th {
  background: transparent; border-bottom: 2px solid var(--c-text);
  font-size: 10px; letter-spacing: 0.1em; font-weight: 700;
}
body[data-concept="editorial"] #main { background: var(--c-bg); }
body[data-concept="editorial"] .sb-themes { border-top: 2px solid var(--c-border); }

/* ─── CONCEPT: NOTION-BRUTALIST ──────────────────── */
body[data-concept="notion-brutalist"] #sidebar { border-right: 2px solid var(--c-border); }
body[data-concept="notion-brutalist"] .page-header {
  background: transparent;
  border-bottom: 3px solid var(--c-text);
  padding: 36px 52px 28px;
}
body[data-concept="notion-brutalist"] .page-title {
  font-size: 32px; font-weight: 800; letter-spacing: -1px;
}
body[data-concept="notion-brutalist"] .page-subtitle {
  font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; margin-top: 8px;
}
body[data-concept="notion-brutalist"] .page-body { padding: 36px 52px; }
body[data-concept="notion-brutalist"] .kpi-row {
  border: none; border-top: 3px solid var(--c-text);
  background: transparent; margin-bottom: 36px; gap: 0;
}
body[data-concept="notion-brutalist"] .kpi-card {
  background: transparent; padding: 26px 32px;
  border-right: 1px solid var(--c-border-sub);
}
body[data-concept="notion-brutalist"] .kpi-main {
  background: transparent; padding: 26px 36px;
}
body[data-concept="notion-brutalist"] .kpi-label {

let currentTheme = 'kt';
let drillTeam = null;
let CAT_COLORS = { ...THEMES.kt.catColors };
let CHART = { ...THEMES.kt.chart };
let T = { accent: THEMES.kt.vars['--c-accent'], positive: THEMES.kt.vars['--c-positive'] };

function applyTheme(name) {
  currentTheme = name;
  const t = THEMES[name];
  const root = document.documentElement;
  Object.entries(t.vars).forEach(([k, v]) => root.style.setProperty(k, v));
  CAT_COLORS = { ...t.catColors };
  CHART = { ...t.chart };
  T = { accent: t.vars['--c-accent'], positive: t.vars['--c-positive'] };
  document.body.dataset.concept = t.concept || 'flat';
  document.querySelectorAll('.theme-swatch').forEach(el =>
    el.classList.toggle('active', el.dataset.theme === name)
  );
  renderPage();
}

function buildThemeSwitcher() {
  const grid = document.getElementById('theme-grid');
  Object.entries(THEMES).forEach(([key, t]) => {
    const el = document.createElement('div');
    el.className = 'theme-swatch' + (key === currentTheme ? ' active' : '');
    el.dataset.theme = key;
    el.title = t.label;
    el.style.background = t.swatch;
    el.onclick = () => applyTheme(key);
    grid.appendChild(el);
  });
}

function seededRand(seed) {
  let s = seed;
  return function() { s = (s * 1664525 + 1013904223) & 0xffffffff; return (s >>> 0) / 0xffffffff; };
}

function genMonths() {
  const m = [];
  for (let y = 2024; y <= 2025; y++) for (let mo = 1; mo <= 12; mo++) {
    if (y === 2025 && mo > 6) break;
    m.push({ ym: `${y}-${String(mo).padStart(2,'0')}`, y, mo });
  }
  return m;
}
const MONTHS = genMonths();

const DATA = [];
(function buildData() {
  const rand = seededRand(42);
  MONTHS.forEach((m, mi) => {
    SERVICES.forEach(svc => {
      TEAMS.forEach(team => {
        const w = TEAM_WEIGHTS[svc.id][team.id];
        const aiGrowth = svc.cat === 'AI도구' ? 1 + mi * 0.035 : 1 + mi * 0.006;
        const noise = 0.88 + rand() * 0.24;
        const cost = Math.round(svc.base * w * aiGrowth * noise);
        const tokens = svc.aiTokens ? Math.round(cost * (800 + rand() * 400)) : 0;
        DATA.push({ ym: m.ym, svc: svc.id, team: team.id, cost, tokens });
      });
    });
  });
})();

}
function sumBy(data, key) { return data.reduce((a, r) => a + r[key], 0); }
function groupBy(data, keyFn) {
  const m = {}; data.forEach(r => { const k = keyFn(r); m[k] = (m[k] || 0) + r.cost; }); return m;
}
function fmt(n) {
  if (n >= 100000000) return '₩' + (n / 100000000).toFixed(1) + '억';
  if (n >= 10000000)  return '₩' + (n / 10000000).toFixed(1) + '천만';
  if (n >= 1000000)   return '₩' + (n / 1000000).toFixed(1) + 'M';
  if (n >= 1000)      return '₩' + Math.round(n / 1000) + 'K';
  return '₩' + n;
}
function fmtTokens(n) {
  if (n >= 1e9) return (n / 1e9).toFixed(1) + 'B';
  if (n >= 1e6) return (n / 1e6).toFixed(1) + 'M';
  if (n >= 1e3) return (n / 1e3).toFixed(0) + 'K';
  return n;
}
function delta(cur, prev) { if (!prev) return 0; return ((cur - prev) / prev * 100); }
function deltaHtml(pct) {
  const cls = pct > 0 ? 'up' : 'down';
  const arrow = pct > 0 ? '▲' : '▼';
  return `<span class="${cls}">${arrow} ${Math.abs(pct).toFixed(2)}%</span>`;
}

function areaChart(seriesList, width, height, opts = {}) {
  const pl = opts.pl || 62, pr = opts.pr || 20, pt = 12, pb = 30;
  const W = width - pl - pr, H = height - pt - pb;
  const allVals = seriesList.flatMap(s => s.data.map(d => d.v));
  const maxV = Math.max(...allVals) * 1.12;
  const n = seriesList[0].data.length;
  function x(i) { return pl + (i / (n - 1)) * W; }
  function y(v) { return pt + H - (v / maxV) * H; }
  const yTicks = [0, 0.25, 0.5, 0.75, 1.0].map(f => ({ v: maxV * f, y: pt + H - f * H }));
  const yLabels = yTicks.map(t =>
    `<text x="${pl - 8}" y="${t.y + 4}" text-anchor="end" font-size="10" fill="${CHART.yLabel}">${fmt(t.v)}</text>
     <line x1="${pl}" y1="${t.y}" x2="${pl + W}" y2="${t.y}" stroke="${CHART.grid}" stroke-width="0.8"/>`
  ).join('');
  const xLabels = seriesList[0].data.map((d, i) => {
    if (i % 3 !== 0 && i !== n - 1) return '';
    return `<text x="${x(i)}" y="${pt + H + 18}" text-anchor="middle" font-size="10" fill="${CHART.yLabel}">${d.label.slice(5)}월</text>`;
  }).join('');
  const charts = seriesList.map(s => {
    const pts = s.data.map((d, i) => `${x(i)},${y(d.v)}`).join(' ');
    const area = `M${pl},${pt + H} L${pts.split(' ').join(' L')} L${pl + W},${pt + H} Z`;
    const line = `M${pts.split(' ').join(' L')}`;
    return `<path d="${area}" fill="${s.color}" fill-opacity="0.12"/>
            <path d="${line}" fill="none" stroke="${s.color}" stroke-width="1.8" stroke-linejoin="round"/>`;
  }).join('');
  return `<svg viewBox="0 0 ${width} ${height}" width="100%" style="max-height:${height}px">
    ${yLabels}${xLabels}${charts}
    <line x1="${pl}" y1="${pt}" x2="${pl}" y2="${pt+H}" stroke="${CHART.axis}" stroke-width="1"/>
    <line x1="${pl}" y1="${pt+H}" x2="${pl+W}" y2="${pt+H}" stroke="${CHART.axis}" stroke-width="1"/>
  </svg>`;
}

function barChart(items, width, height, color = '#888') {
  const maxV = Math.max(...items.map(i => i.v));
  const barH = Math.min(28, (height - 20) / items.length - 6);
  const pl = 8, pr = 80, W = width - pl - pr;
  const bars = items.map((item, i) => {
    const bw = (item.v / maxV) * W;
    const by = 10 + i * (barH + 8);
    return `<rect x="${pl}" y="${by}" width="${bw}" height="${barH}" fill="${item.color || color}" rx="2"/>
      <text x="${pl + bw + 6}" y="${by + barH * 0.72}" font-size="11" fill="${CHART.barValue}">${fmt(item.v)}</text>
      <text x="${pl + bw / 2}" y="${by - 4}" text-anchor="middle" font-size="10" fill="${CHART.barName}">${item.label}</text>`;
  }).join('');
  const h = 10 + items.length * (barH + 8) + 10;
  return `<svg viewBox="0 0 ${width} ${h}" width="100%" style="max-height:${h}px">${bars}</svg>`;
}

function hBarChart(items, width, color = '#888') {
  const n = Math.min(items.length, 7);
  const sliced = items.slice(0, n);
  const maxV = Math.max(...sliced.map(i => i.v));
  const barW = Math.floor((width - 24) / n) - 6;
  const chartH = 90;
  const bars = sliced.map((item, i) => {
    const bh = Math.max(4, (item.v / maxV) * chartH);
    const bx = 12 + i * (barW + 6);
    const by = chartH - bh + 10;
    const label = item.label.length > 8 ? item.label.slice(0, 8) + '..' : item.label;
    return `<rect x="${bx}" y="${by}" width="${barW}" height="${bh}" fill="${item.color || color}" rx="2" fill-opacity="0.85"/>

      <text x="${bx + barW / 2}" y="${chartH + 22}" text-anchor="middle" font-size="9" fill="${CHART.barName}">${label}</text>`;

  return `<svg viewBox="0 0 ${width} ${chartH + 32}" width="100%" style="max-height:${chartH + 32}px">${bars}</svg>`;
}

const curYm  = '2025-06';
const prevYm = '2025-05';
const curYoy = '2024-06';

function getFilteredBase() {
  let d = DATA;
  if (state.category !== 'all') d = d.filter(r => SERVICES.find(s => s.id === r.svc)?.cat === state.category);
  if (state.team !== 'all')     d = d.filter(r => r.team === state.team);
  return d;
}

function computeActions(cur, prev) {
  const actions = [];
  SERVICES.forEach(s => {
    const v  = cur.filter(r => r.svc === s.id).reduce((a,r)=>a+r.cost,0);
    const pv = prev.filter(r => r.svc === s.id).reduce((a,r)=>a+r.cost,0);
    const owner = SERVICE_OWNERS[s.id];
    const exp = EXPIRY[s.id];
    const overBudget = BUDGETS[s.id] && v > BUDGETS[s.id];
    const mom = pv > 0 ? (v - pv) / pv * 100 : 0;
    if (overBudget && mom > 25) {
      actions.push({ pri:'critical', label:'즉시 재협상', svc:s.name, detail:'+'+mom.toFixed(0)+'% · 예산 '+((v/BUDGETS[s.id])*100).toFixed(0)+'% 집행', owner:owner?.owner, approver:owner?.approver, due:'이번 달 내' });
    } else if (overBudget) {
      actions.push({ pri:'critical', label:'예산 조정 요청', svc:s.name, detail:'예산 '+((v/BUDGETS[s.id])*100).toFixed(0)+'% 집행', owner:owner?.owner, approver:owner?.approver, due:'이번 달 내' });
    } else if (mom > 25) {
      actions.push({ pri:'high', label:'원인 분석 보고서', svc:s.name, detail:'MoM +'+mom.toFixed(0)+'%', owner:owner?.owner, approver:owner?.approver, due:'2주 내' });
    }
    if (exp) {
      const [ey,em] = exp.split('-').map(Number);
      const diff = (ey-2025)*12+(em-6);
      if (diff >= 0 && diff <= 3) {
        actions.push({ pri:'medium', label:'계약 갱신 협상 시작', svc:s.name, detail:'만료: '+exp, owner:owner?.owner, approver:owner?.approver, due:exp+' 전' });
      }
    }
  });
  return actions.sort((a,b) => ({critical:0,high:1,medium:2}[a.pri] - {critical:0,high:1,medium:2}[b.pri]));
}

function ci(t) { return '<div class="chart-insight">' + t + '</div>'; }

function renderOverview() {
  const base = getFilteredBase();
  const cur  = base.filter(r => r.ym === curYm);
  const prev = base.filter(r => r.ym === prevYm);
  const yoy  = base.filter(r => r.ym === curYoy);
  const totalCur  = sumBy(cur, 'cost');
  const totalPrev = sumBy(prev, 'cost');
  const totalYoy  = sumBy(yoy, 'cost');
  const pct    = delta(totalCur, totalPrev);
  const yoyPct = delta(totalCur, totalYoy);

  const totalBudget = SERVICES.reduce((a, s) => a + (BUDGETS[s.id] || 0), 0);
  const budgetPct   = totalBudget ? ((totalCur / totalBudget) * 100).toFixed(1) : null;

  const totalTokens = sumBy(cur, 'tokens');
  const prevTokens  = sumBy(prev, 'tokens');
  const tokenPct    = delta(totalTokens, prevTokens);

  const activeServices = [...new Set(cur.filter(r => r.cost > 0).map(r => r.svc))].length;

  // 임원 시그널 계산
  const overBudgetSvcs = SERVICES.filter(s => {
    const cv = sumBy(cur.filter(r => r.svc === s.id), 'cost');
    return BUDGETS[s.id] && cv > BUDGETS[s.id];
  });
  const expiringSoon = SERVICES.filter(s => {
    const exp = EXPIRY[s.id]; if (!exp) return false;
    const [ey, em] = exp.split('-').map(Number);
    return (ey - 2025) * 12 + (em - 6) >= 0 && (ey - 2025) * 12 + (em - 6) <= 3;
  });
  const aiTrend = MONTHS.slice(-6).map(m =>
    sumBy(base.filter(r => r.ym === m.ym && SERVICES.find(s => s.id === r.svc)?.cat === 'AI도구'), 'cost')
  );
  let consec = 0;
  for (let i = aiTrend.length - 1; i > 0; i--) {
    if (aiTrend[i] > aiTrend[i - 1]) consec++;
    else break;
  }

  const sb = `var(--c-border-w) solid var(--c-border)`;
  const signalCards = `
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:20px;">
      <div style="background:var(--c-surface);border:${sb};padding:16px 20px;">
        <div style="font-size:10px;color:var(--c-text-dim);font-weight:700;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:8px;">AI 비용 연속 증가</div>
        <div style="font-size:28px;font-weight:700;color:${T.accent};line-height:1">${consec}개월째</div>
        <div style="font-size:11px;color:var(--c-text-muted);margin-top:6px;">최근 6개월 기준 · 계약 조건 재검토 권고</div>
      </div>
      <div style="background:var(--c-surface);border:${sb};padding:16px 20px;">
        <div style="font-size:10px;color:var(--c-text-dim);font-weight:700;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:8px;">예산 초과 서비스</div>
        <div style="font-size:28px;font-weight:700;color:${T.accent};line-height:1">${overBudgetSvcs.length}개</div>
        <div style="font-size:11px;color:var(--c-text-muted);margin-top:6px;">${overBudgetSvcs.slice(0,2).map(s=>s.name).join(', ')}${overBudgetSvcs.length > 2 ? ' 외 '+(overBudgetSvcs.length-2)+'개' : ''}</div>
      </div>
      <div style="background:var(--c-surface);border:${sb};padding:16px 20px;">
        <div style="font-size:10px;color:var(--c-text-dim);font-weight:700;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:8px;">계약 만료 임박 (3개월)</div>
        <div style="font-size:28px;font-weight:700;color:${T.accent};line-height:1">${expiringSoon.length}개</div>
        <div style="font-size:11px;color:var(--c-text-muted);margin-top:6px;">${expiringSoon.slice(0,2).map(s=>s.name+' '+EXPIRY[s.id]).join(' · ')}</div>
      </div>
    </div>`;

  const histData = MONTHS.map(m => ({ label: m.ym, v: sumBy(base.filter(r => r.ym === m.ym), 'cost') }));
  const catSums = CATEGORIES.map(cat => {
    const cv = sumBy(cur.filter(r => SERVICES.find(s => s.id === r.svc)?.cat === cat), 'cost');
    const pv = sumBy(prev.filter(r => SERVICES.find(s => s.id === r.svc)?.cat === cat), 'cost');
    return { cat, cv, pv, pct: delta(cv, pv) };
  }).sort((a, b) => Math.abs(b.pct) - Math.abs(a.pct));
  const svcSums = SERVICES.map(s => ({
    label: s.name, v: sumBy(cur.filter(r => r.svc === s.id), 'cost'), color: CAT_COLORS[s.cat]
  })).sort((a, b) => b.v - a.v);
  const teamSums = TEAMS.map(t => ({
    label: t.name, v: sumBy(cur.filter(r => r.team === t.id), 'cost'), color: CHART.barValue
  })).sort((a, b) => b.v - a.v);
  const trendCards = catSums.slice(0, 2).map(c => {
    const top2 = SERVICES.filter(s => s.cat === c.cat)
      .map(s => ({ name: s.name, cv: sumBy(cur.filter(r => r.svc === s.id), 'cost'), pv: sumBy(prev.filter(r => r.svc === s.id), 'cost') }))
      .sort((a, b) => Math.abs(delta(b.cv, b.pv)) - Math.abs(delta(a.cv, a.pv))).slice(0, 2);
    return `<div class="trend-card">
      <div class="trend-card-header">
        <span class="trend-card-title" style="color:${CAT_COLORS[c.cat]}">${c.cat}</span>
        <span style="font-size:11px;color:var(--c-text-muted);">전월 대비 ${c.pct >= 0 ? '+' : ''}${c.pct.toFixed(1)}%</span>
      </div>
      <div class="trend-items">
        ${top2.map((t, ti) => `<div class="trend-item">
          <div class="trend-item-label">${t.name}</div>
          <div class="trend-item-sub">${ti === 0 ? '증감 1위' : '증감 2위'}</div>
          <div class="trend-item-val">${fmt(t.cv)}</div>
          <div class="trend-item-delta ${delta(t.cv, t.pv) > 0 ? 'up' : 'down'}">
            ${delta(t.cv, t.pv) > 0 ? '▲' : '▼'} ${Math.abs(delta(t.cv, t.pv)).toFixed(2)}%
          </div></div>`).join('')}
      </div></div>`;
  }).join('');
  const catHistData = CATEGORIES.map(cat => ({
    color: CAT_COLORS[cat], label: cat,
    data: MONTHS.map(m => ({ label: m.ym, v: sumBy(base.filter(r => r.ym === m.ym && SERVICES.find(s => s.id === r.svc)?.cat === cat), 'cost') }))
  }));
  const legendHtml = CATEGORIES.map(cat =>
    `<span class="legend-item"><span class="legend-dot" style="background:${CAT_COLORS[cat]}"></span>${cat}</span>`
  ).join('');
  const ovConsec = (() => { let c = 0; const hv = MONTHS.map(m => sumBy(base.filter(r => r.ym === m.ym), 'cost')); for (let i = hv.length - 1; i > 0; i--) { if (hv[i] > hv[i-1]) c++; else break; } return c; })();
  const ovTop3Pct = svcSums.length >= 3 ? (svcSums.slice(0,3).reduce((a,s)=>a+s.v,0) / totalCur * 100).toFixed(0) : '—';
  const ovTeamRatio = teamSums.length >= 2 ? (teamSums[0].v / teamSums[teamSums.length-1].v).toFixed(1) : '—';
  const ovAiCur = sumBy(cur.filter(r => SERVICES.find(s=>s.id===r.svc)?.cat==='AI도구'), 'cost');
  const ovCloudCur = sumBy(cur.filter(r => SERVICES.find(s=>s.id===r.svc)?.cat==='클라우드'), 'cost');
  const ovAiPrev = sumBy(prev.filter(r => SERVICES.find(s=>s.id===r.svc)?.cat==='AI도구'), 'cost');
  const ovAiMoM = ovAiPrev > 0 ? delta(ovAiCur, ovAiPrev) : 0;
  const actions = computeActions(cur, prev);
  const priColor = { critical: T.accent, high: '#efb05d', medium: 'var(--c-text-dim)' };
  const priLabel = { critical: '즉시', high: '2주 내', medium: '이번 분기' };
  const actionCards = actions.slice(0, 6).map(a =>
    '<div style="background:var(--c-surface);border:1px solid var(--c-border);padding:10px 14px;min-width:190px;flex:0 0 auto;">' +
    '<div style="display:flex;align-items:center;gap:6px;margin-bottom:4px">' +
    '<span style="font-size:9px;font-weight:700;background:' + priColor[a.pri] + ';color:#fff;padding:1px 6px;border-radius:2px">' + priLabel[a.pri] + '</span>' +
    '<span style="font-size:10px;font-weight:600;color:' + priColor[a.pri] + '">' + a.label + '</span></div>' +
    '<div style="font-size:12px;font-weight:600;margin-bottom:2px">' + a.svc + '</div>' +
    '<div style="font-size:10px;color:var(--c-text-muted);margin-bottom:3px">' + a.detail + '</div>' +
    '<div style="font-size:10px;color:var(--c-text-dim)">담당: <strong>' + (a.owner||'—') + '</strong> &nbsp; 승인: ' + (a.approver||'—') + '</div>' +
    '</div>'
  ).join('');
  return `
  <div class="page-header">
    <div class="page-header-top">
      <div><div class="page-title">Overview</div><div class="page-subtitle">2025년 6월 경영 요약 — 즉시 검토 필요 ${overBudgetSvcs.length + expiringSoon.length}건</div></div>
      <div class="page-refresh">${DATA_UPDATE_LABEL}</div>
    </div>
  </div>
  <div class="page-body">
    ${signalCards}
    ${actions.length > 0 ? `<div style="margin-bottom:20px;"><div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.07em;color:var(--c-text-dim);margin-bottom:8px;">이번 달 액션 필요 — ${actions.length}건</div><div style="display:flex;gap:10px;overflow-x:auto;padding-bottom:4px">${actionCards}</div></div>` : ''}
    <div class="kpi-row">
      <div class="kpi-main">
        <div class="kpi-label">월 구독 총비용</div>
        <div class="kpi-value">${fmt(totalCur)}</div>
        <div class="kpi-delta ${pct > 0 ? 'up' : 'down'}">${deltaHtml(pct)} MoM &nbsp;|&nbsp; <span style="color:${yoyPct>0?T.accent:T.positive}">${yoyPct>0?'▲':'▼'} ${Math.abs(yoyPct).toFixed(1)}%</span> YoY</div>
        <div class="kpi-sub">월 예산 대비 ${budgetPct}% 집행</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">AI 토큰 소비 (Input+Output 추정)</div>
        <div class="kpi-value">${fmtTokens(totalTokens)}</div>
        <div class="kpi-delta ${tokenPct > 0 ? 'up' : 'down'}">${deltaHtml(tokenPct)}</div>
        <div class="kpi-sub">Copilot · Bedrock · Vertex AI 합산</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">예산 초과 서비스</div>
        <div class="kpi-value">${overBudgetSvcs.length}개</div>
        <div class="kpi-sub">전체 ${activeServices}개 서비스 중</div>
      </div>
    </div>
    <div class="chart-card primary" style="margin-bottom:20px;">
      <div class="chart-title">비용 상승세가 구조적인가, 일시적인가?</div>
      <div class="chart-subtitle">월간 구독비용 절대값 추이 2024.01 — 2025.06 · 단위: 원(₩)</div>
      ${ci(ovConsec >= 3 ? ovConsec + '개월 연속 상승 지속 → 구조적 증가 패턴으로 판단됨' : pct > 0 ? '이번 달 MoM +' + pct.toFixed(1) + '% 상승, 연속성 미확인 — 일시적 변동 가능성 존재' : '이번 달 MoM ' + pct.toFixed(1) + '% 하락, 상승세 일시 중단')}
      ${areaChart([{ color: T.accent, data: histData }], 900, 160)}
    </div>
    <div class="section-divider"><div class="section-divider-text">2025년 6월 주요 변동 — 전월 대비 증감률 기준</div></div>
    <div class="trend-grid">${trendCards}</div>
    <div class="chart-grid col-2" style="margin-bottom:20px;">
      <div class="chart-card"><div class="chart-title">상위 3개 서비스가 전체 예산의 절반 이상인가?</div><div class="chart-subtitle">이번 달 서비스별 구독비용</div>${ci('상위 3개(' + svcSums.slice(0,3).map(s=>s.label).join('·') + ')가 전체의 ' + ovTop3Pct + '% → ' + (parseInt(ovTop3Pct)>=50 ? '집중도 높음, 협상 레버리지 확보 가능' : '비교적 분산된 구조'))}${hBarChart(svcSums.slice(0,7), 380)}</div>
      <div class="chart-card"><div class="chart-title">팀 간 1인당 비용 격차가 합리적인가?</div><div class="chart-subtitle">이번 달 팀별 총 구독비용</div>${ci('최고 지출 ' + teamSums[0]?.label + ' vs 최저 ' + teamSums[teamSums.length-1]?.label + ' — 지출 격차 ' + ovTeamRatio + '배 · 1인당 비용 검토 필요')}${hBarChart(teamSums, 380)}</div>
    </div>
    <div class="chart-card">
      <div class="chart-title">AI 도구가 클라우드 비중을 역전하는 시점은?</div>
      <div class="chart-subtitle">카테고리별 월간 구독비용 2024.01 — 2025.06 · 단위: 원(₩)</div>
      ${ci('현재 AI ' + (ovAiCur/totalCur*100).toFixed(0) + '% vs 클라우드 ' + (ovCloudCur/totalCur*100).toFixed(0) + '% · AI MoM ' + (ovAiMoM>=0?'+':'') + ovAiMoM.toFixed(1) + '% 고성장 지속 — 역전 시점 추적 필요')}
      ${areaChart(catHistData, 900, 180)}
      <div class="legend">${legendHtml}</div>
    </div>
  </div>`;
}

function renderServices() {
  const base = getFilteredBase();
  const cur  = base.filter(r => r.ym === curYm);
  const prev = base.filter(r => r.ym === prevYm);
  const yoy  = base.filter(r => r.ym === curYoy);
  const totalCur  = sumBy(cur, 'cost');
  const totalPrev = sumBy(prev, 'cost');
  const pct = delta(totalCur, totalPrev);
  const overBudgetSvcs = SERVICES.filter(s => {
    const cv = sumBy(cur.filter(r => r.svc === s.id), 'cost');
    return BUDGETS[s.id] && cv > BUDGETS[s.id];
  });
  const catData = CATEGORIES.map(cat => ({
    label: cat, v: sumBy(cur.filter(r => SERVICES.find(s => s.id === r.svc)?.cat === cat), 'cost'), color: CAT_COLORS[cat]
  })).sort((a, b) => b.v - a.v);
  const svcData = SERVICES.map(s => ({
    label: s.name, v: sumBy(cur.filter(r => r.svc === s.id), 'cost'),
    pv: sumBy(prev.filter(r => r.svc === s.id), 'cost'),
    yv: sumBy(yoy.filter(r => r.svc === s.id), 'cost'),
    cat: s.cat, id: s.id
  })).sort((a, b) => b.v - a.v);
  const catHistData = CATEGORIES.map(cat => ({
    color: CAT_COLORS[cat], label: cat,
    data: MONTHS.map(m => ({ label: m.ym, v: sumBy(base.filter(r => r.ym === m.ym && SERVICES.find(s => s.id === r.svc)?.cat === cat), 'cost') }))
  }));
  const tableRows = svcData.map(s => {
    const d = delta(s.v, s.pv);
    const yoyD = delta(s.v, s.yv);
    const budget = BUDGETS[s.id];
    const budgetPct = budget ? ((s.v / budget) * 100).toFixed(0) : null;
    const overBudget = budget && s.v > budget;
    const expiry = EXPIRY[s.id];
    const expWarn = expiry && (() => {
      const [ey, em] = expiry.split('-').map(Number);
      const diff = (ey - 2025) * 12 + (em - 6);
      return diff >= 0 && diff <= 3;
    })();
    const owner = SERVICE_OWNERS[s.id];
    const util = UTILIZATION[s.id];
    const utilPct = util?.total ? Math.round(util.used / util.total * 100) : null;
    const basis = BUDGET_BASIS[s.id];
    const budgetYoY = basis?.prev ? ((BUDGETS[s.id] - basis.prev) / basis.prev * 100).toFixed(0) : null;
    return `<tr style="${overBudget ? 'background:rgba(232,0,13,0.025)' : ''}">
      <td>
        <strong>${s.label}</strong>${expWarn ? `&nbsp;<span style="font-size:10px;background:${T.accent};color:#fff;padding:1px 5px;font-weight:700;">만료임박</span>` : ''}
        ${owner ? `<div style="font-size:9px;color:var(--c-text-muted);margin-top:1px">담당: ${owner.owner} · 승인: ${owner.approver}</div>` : ''}
      </td>
      <td><span class="badge ${CAT_BADGE[s.cat]}">${s.cat}</span></td>
      <td style="text-align:right;font-size:11px;color:${utilPct === null ? 'var(--c-text-muted)' : utilPct < 70 ? T.accent : T.positive};font-weight:${utilPct !== null && utilPct < 70 ? '600' : '400'}">${utilPct !== null ? utilPct + '%<br><span style="font-size:9px;color:var(--c-text-muted)">' + util.used + '/' + util.total + '석</span>' : '<span style="color:var(--c-text-muted)">API</span>'}</td>
      <td style="text-align:right;font-weight:600">${fmt(s.v)}</td>
      <td style="text-align:right">${fmt(s.pv)}</td>
      <td style="text-align:right;color:${d > 0 ? T.accent : T.positive}">${d > 0 ? '▲' : '▼'} ${Math.abs(d).toFixed(1)}%</td>
      <td style="text-align:right;color:${yoyD > 0 ? T.accent : T.positive}">${yoyD > 0 ? '▲' : '▼'} ${Math.abs(yoyD).toFixed(1)}%</td>
      <td style="text-align:right;color:${overBudget ? T.accent : T.positive};font-weight:${overBudget?'700':'400'}" title="${basis ? basis.basis + (budgetYoY ? ' · 전년比 '+budgetYoY+'%' : '') : ''}">${budgetPct ? budgetPct+'%' : '—'}${budgetYoY ? `<div style="font-size:9px;color:var(--c-text-muted)">${parseInt(budgetYoY)>=0?'+':''}${budgetYoY}% YoY</div>` : ''}</td>
      <td style="text-align:right;font-size:11px;color:${expWarn ? T.accent : 'var(--c-text-muted)'};font-weight:${expWarn?'600':'400'}">${expiry || '—'}</td>
    </tr>`;
  }).join('');
  const legendHtml = CATEGORIES.map(cat =>
    `<span class="legend-item"><span class="legend-dot" style="background:${CAT_COLORS[cat]}"></span>${cat}</span>`
  ).join('');
  const svcTop3Pct = (svcData.slice(0,3).reduce((a,s)=>a+s.v,0) / totalCur * 100).toFixed(0);
  const svcAiCur = sumBy(cur.filter(r=>SERVICES.find(s=>s.id===r.svc)?.cat==='AI도구'),'cost');
  const svcAiPrev = sumBy(prev.filter(r=>SERVICES.find(s=>s.id===r.svc)?.cat==='AI도구'),'cost');
  const svcCloudCur = sumBy(cur.filter(r=>SERVICES.find(s=>s.id===r.svc)?.cat==='클라우드'),'cost');
  const svcCloudPrev = sumBy(prev.filter(r=>SERVICES.find(s=>s.id===r.svc)?.cat==='클라우드'),'cost');
  const svcAiMoM = svcAiPrev > 0 ? delta(svcAiCur, svcAiPrev) : 0;
  const svcCloudMoM = svcCloudPrev > 0 ? delta(svcCloudCur, svcCloudPrev) : 0;
  const svcExpiring = SERVICES.filter(s => { const exp = EXPIRY[s.id]; if(!exp) return false; const [ey,em] = exp.split('-').map(Number); return (ey-2025)*12+(em-6)>=0&&(ey-2025)*12+(em-6)<=3; }).length;
  return `
  <div class="page-header">
    <div class="page-header-top">
      <div><div class="page-title">서비스별 현황</div><div class="page-subtitle">2025년 6월 · 예산 대비 · YoY · 계약 만료 포함</div></div>
      <div class="page-refresh">${DATA_UPDATE_LABEL}</div>
    </div>
  </div>
  <div class="page-body">
    <div class="kpi-row">
      <div class="kpi-main">
        <div class="kpi-label">서비스 총비용</div>
        <div class="kpi-value">${fmt(totalCur)}</div>
        <div class="kpi-delta ${pct > 0 ? 'up' : 'down'}">${deltaHtml(pct)}</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">예산 초과 서비스</div>
        <div class="kpi-value">${overBudgetSvcs.length}개</div>
        <div class="kpi-sub">${overBudgetSvcs.slice(0,2).map(s=>s.name).join(', ')}</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">가장 빠른 증가 (MoM)</div>
        <div class="kpi-value" style="font-size:18px;">${[...svcData].sort((a,b)=>delta(b.v,b.pv)-delta(a.v,a.pv))[0]?.label}</div>
        <div class="kpi-sub" style="color:${T.accent}">▲ ${Math.abs(delta([...svcData].sort((a,b)=>delta(b.v,b.pv)-delta(a.v,a.pv))[0]?.v,[...svcData].sort((a,b)=>delta(b.v,b.pv)-delta(a.v,a.pv))[0]?.pv)).toFixed(1)}%</div>
      </div>

// ─── ML HELPERS (pure JS, no CDN) ────────────────────────────────
function linRegModel(ys) {
  const n = ys.length;
  const sx = n*(n-1)/2, sy = ys.reduce((a,b)=>a+b,0);
  const sxy = ys.reduce((a,y,i)=>a+i*y,0);
  const sx2 = n*(n-1)*(2*n-1)/6;
  const b = (n*sxy - sx*sy) / (n*sx2 - sx*sx);
  const a = (sy - b*sx) / n;
  return { a, b, predict: x => a + b*x };
}

function holtSmooth(ys, alpha=0.35, beta=0.1, nFwd=6) {
  let l = ys[0], b = ys[1] - ys[0];
  const fit = [l];
  for (let i = 1; i < ys.length; i++) {
    const lp = l, bp = b;
    l = alpha * ys[i] + (1-alpha) * (lp + bp);
    b = beta * (l - lp) + (1-beta) * bp;
    fit.push(l + b);
  }
  const fwd = Array.from({length: nFwd}, (_, h) => l + (h+1)*b);
  return { fit, fwd };
}

function zScore(ys, thr=2.0) {
  const mu = ys.reduce((a,b)=>a+b,0)/ys.length;
  const sigma = Math.sqrt(ys.reduce((a,y)=>a+(y-mu)**2,0)/ys.length);
  return ys.map(y => sigma > 0 && Math.abs(y-mu)/sigma > thr);
}

function forecastChartSVG(historical, holtFwd, lr, anomalies, W, H) {
  const pad = {l:52, r:16, t:18, b:28};
  const PW = W - pad.l - pad.r;
  const PH = H - pad.t - pad.b;
  const nH = historical.length, nF = holtFwd.length, nT = nH + nF;
  const allV = [...historical.map(d=>d.v), ...holtFwd.filter(v=>v>0)];
  const minV = Math.min(...allV) * 0.88;
  const maxV = Math.max(...allV) * 1.08;
  const range = maxV - minV || 1;
  const X = i => pad.l + (i / (nT-1)) * PW;
  const Y = v => pad.t + PH - Math.max(0, Math.min(1, (v - minV) / range)) * PH;

  const hPts = historical.map((d,i) => X(i)+','+Y(d.v)).join('L');
  const area = 'M'+hPts+' L'+X(nH-1)+','+Y(minV)+' L'+X(0)+','+Y(minV)+'Z';
  const holtLine = 'M'+X(nH-1)+','+Y(historical[nH-1].v)+holtFwd.map((v,i)=>' L'+X(nH+i)+','+Y(v)).join('');
  const linY0 = Math.max(minV*0.5, lr.predict(0));
  const linY1 = lr.predict(nT-1);
  const linLine = 'M'+X(0)+','+Y(Math.min(maxV,Math.max(minV,linY0)))+' L'+X(nT-1)+','+Y(Math.min(maxV*1.2,Math.max(minV*0.5,linY1)));

  const dots = historical.map((d,i) => anomalies[i]
    ? '<circle cx="'+X(i)+'" cy="'+Y(d.v)+'" r="4.5" fill="#ef7d86" stroke="white" stroke-width="1.5"/>' : '').join('');

  const grid = [0,.25,.5,.75,1].map(f => {
    const v = minV + range*f, y = Y(v);
    return '<line x1="'+pad.l+'" x2="'+(pad.l+PW)+'" y1="'+y+'" y2="'+y+'" stroke="var(--c-border)" stroke-width="1" opacity="0.35"/>'+
      '<text x="'+(pad.l-4)+'" y="'+(y+4)+'" text-anchor="end" font-size="9" fill="'+CHART.barName+'">'+(v/1000000).toFixed(1)+'M</text>';
  }).join('');

  const xLabels = historical.filter((_,i)=>i%3===0).map(d => {
    const i = historical.findIndex(h=>h.label===d.label);
    return '<text x="'+X(i)+'" y="'+(pad.t+PH+16)+'" text-anchor="middle" font-size="9" fill="'+CHART.barName+'">'+d.label+'</text>';
  }).join('') + '<text x="'+X(nT-1)+'" y="'+(pad.t+PH+16)+'" text-anchor="middle" font-size="9" fill="'+CHART.barName+'" opacity="0.6">+6M</text>';

  const divX = X(nH-1);
  return '<svg viewBox="0 0 '+W+' '+H+'" width="100%">'+
    '<rect x="'+divX+'" y="'+pad.t+'" width="'+(pad.l+PW-divX)+'" height="'+PH+'" fill="var(--c-accent)" opacity="0.04"/>'+
    grid+'<path d="'+area+'" fill="'+T.accent+'" opacity="0.1"/>'+
    '<path d="M'+hPts+'" fill="none" stroke="'+T.accent+'" stroke-width="2"/>'+
    '<path d="'+linLine+'" fill="none" stroke="#efb05d" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.65"/>'+
    '<path d="'+holtLine+'" fill="none" stroke="'+T.accent+'" stroke-width="2" stroke-dasharray="5,3" opacity="0.75"/>'+
    dots+xLabels+
    '<line x1="'+divX+'" y1="'+pad.t+'" x2="'+divX+'" y2="'+(pad.t+PH)+'" stroke="var(--c-text-dim)" stroke-width="1" stroke-dasharray="3,2" opacity="0.5"/>'+
    '<text x="'+(divX+4)+'" y="'+(pad.t+11)+'" font-size="9" fill="var(--c-text-dim)">예측 →</text>'+
    '</svg>';
}

// ─── SIMULATION FUNCTIONS ─────────────────────────────────────────
function updateSim() {
  const cur = DATA.filter(r => r.ym === curYm);
  const totalCur = sumBy(cur, 'cost');
  let totalSim = 0;
  const catSim = {};
  const svcSavings = [];

  SERVICES.forEach(s => {
    const slEl = document.getElementById('sim-' + s.id);
    const cxEl = document.getElementById('simx-' + s.id);
    if (!slEl) return;
    const pct  = cxEl?.checked ? -100 : parseInt(slEl.value);
    const orig = sumBy(cur.filter(r => r.svc === s.id), 'cost');
    const sim  = Math.max(0, orig * (1 + pct / 100));
    totalSim  += sim;
    const saved = orig - sim;
    if (saved !== 0) svcSavings.push({ name: s.name, saved });

    const key = s.cat.replace(/\//g,'');
    if (!catSim[key]) catSim[key] = { orig:0, sim:0 };
    catSim[key].orig += orig;
    catSim[key].sim  += sim;

    const pctEl = document.getElementById('sim-pct-' + s.id);
    const dEl   = document.getElementById('sim-delta-' + s.id);
    if (pctEl) { pctEl.textContent = (pct>=0?'+':'')+pct+'%'; pctEl.style.color = pct<0?T.positive:pct>0?T.accent:'var(--c-text-dim)'; }
    if (dEl)   { dEl.textContent = saved===0?'—':(saved>0?'▼ ':'▲ ')+fmt(Math.abs(Math.round(saved))); dEl.style.color = saved>0?T.positive:saved<0?T.accent:'var(--c-text-dim)'; }
  });

  const savings = totalCur - totalSim;
  const afterEl = document.getElementById('sim-after');
  const savEl   = document.getElementById('sim-savings');
  const pctEl2  = document.getElementById('sim-savings-pct');
  const signEl  = document.getElementById('sim-savings-sign');
  if (afterEl) afterEl.textContent = fmt(Math.round(totalSim));
  if (savEl)  { savEl.textContent = fmt(Math.abs(Math.round(savings))); savEl.style.color = savings>0?T.positive:T.accent; }
  if (pctEl2) pctEl2.textContent = (Math.abs(savings/totalCur)*100).toFixed(1)+'%';
  if (signEl) signEl.textContent = savings>0?'절감':'증가';

  CATEGORIES.forEach(cat => {
    const key = cat.replace(/\//g,'');
    const d = catSim[key] || {orig:0, sim:0};
    const diff = d.sim - d.orig;
    const sEl = document.getElementById('simcat-'+key);
    const dEl = document.getElementById('simcat-d-'+key);
    if (sEl) sEl.textContent = fmt(Math.round(d.sim));
    if (dEl) { dEl.textContent = diff===0?'—':(diff<0?'▼ ':'▲ ')+fmt(Math.abs(Math.round(diff))); dEl.style.color = diff<0?T.positive:diff>0?T.accent:'var(--c-text-dim)'; }
  });

  const topEl = document.getElementById('sim-top-savings');
  if (topEl) {
    const sorted = [...svcSavings].sort((a,b)=>b.saved-a.saved).slice(0,5);
    topEl.innerHTML = sorted.length===0
      ? '슬라이더를 조정하면 여기에 표시됩니다.'
      : sorted.map(s=>'<div style="display:flex;justify-content:space-between;padding:3px 0;font-size:11px"><span>'+s.name+'</span><span style="font-weight:600;color:'+(s.saved>0?T.positive:T.accent)+'">'+(s.saved>0?'▼ ':'▲ ')+fmt(Math.abs(Math.round(s.saved)))+'</span></div>').join('');
  }
}

function resetSim() {
  document.querySelectorAll('.sim-slider').forEach(el => { el.value = 0; });
  document.querySelectorAll('[id^="simx-"]').forEach(el => { el.checked = false; });
  updateSim();

function applySim20() {
  const cur = DATA.filter(r => r.ym === curYm);
  const prev = DATA.filter(r => r.ym === prevYm);
  SERVICES.forEach(s => {
    const v  = sumBy(cur.filter(r=>r.svc===s.id),'cost');
    const pv = sumBy(prev.filter(r=>r.svc===s.id),'cost');
    if (delta(v,pv) > 15) { const sl = document.getElementById('sim-'+s.id); if (sl) sl.value = -20; }
  });
  updateSim();
}

function updateTeamSim(teamId) {
  const cur = DATA.filter(r => r.ym === curYm && r.team === teamId);
  const base = sumBy(cur, 'cost');
  let adj = 0;
  document.querySelectorAll('[id^="tsim-"]').forEach(el => {
    if (el.type !== 'range') return;
    const svcId = el.id.replace('tsim-','');
    const pct = parseInt(el.value);
    adj += sumBy(cur.filter(r=>r.svc===svcId),'cost') * pct / 100;
    const lbl = document.getElementById('tsim-pct-'+svcId);
    if (lbl) { lbl.textContent=(pct>=0?'+':'')+pct+'%'; lbl.style.color=pct<0?T.positive:pct>0?T.accent:'var(--c-text-dim)'; }
  });
  const simTotal = base + adj;
  const totalEl = document.getElementById('tsim-total');
  if (totalEl) {
    const saved = base - simTotal;
    totalEl.innerHTML = fmt(Math.round(simTotal)) +
      (saved>0?' <span style="font-size:10px;color:'+T.positive+'">(▼ '+fmt(Math.round(saved))+' 절감)</span>':'');
  }
}

function updateCostSim() {
  const cur = DATA.filter(r => r.ym === curYm);
  const totalCur = sumBy(cur, 'cost');
  let totalSim = totalCur;
  document.querySelectorAll('[id^="csim-"]').forEach(el => {
    if (el.type !== 'range') return;
    const svcId = el.id.replace('csim-','');
    const pct = parseInt(el.value);
    totalSim += sumBy(cur.filter(r=>r.svc===svcId),'cost') * pct / 100;
    const lbl = document.getElementById('csim-pct-'+svcId);
    if (lbl) { lbl.textContent=(pct>=0?'+':'')+pct+'%'; lbl.style.color=pct<0?T.positive:pct>0?T.accent:'var(--c-text-dim)'; }
  });
  const saved = totalCur - totalSim;
  const aEl = document.getElementById('cost-sim-after');
  const sEl = document.getElementById('cost-sim-savings');
  if (aEl) aEl.textContent = fmt(Math.round(totalSim));
  if (sEl) { sEl.textContent=(saved>=0?'▼ ':'▲ ')+fmt(Math.abs(Math.round(saved))); sEl.style.color=saved>0?T.positive:T.accent; }
}

function selectTeamDrill(teamId) {
  drillTeam = teamId;
  document.querySelectorAll('[data-team-rect]').forEach(rect => {
    const sel = rect.dataset.teamRect === teamId;
    rect.setAttribute('fill-opacity', sel ? '1' : '0.35');
    if (sel) { rect.setAttribute('stroke', T.accent); rect.setAttribute('stroke-width', '2'); }
    else { rect.removeAttribute('stroke'); rect.removeAttribute('stroke-width'); }
  });
  const titleEl = document.getElementById('drill-title');
  const tbodyEl = document.getElementById('drill-tbody');
  if (!titleEl || !tbodyEl) return;
  const team = TEAMS.find(t => t.id === teamId);
  titleEl.textContent = (team ? team.name : teamId) + ' — 어떤 서비스가 비용을 올리는가?';
  const cur  = DATA.filter(r => r.ym === curYm  && r.team === teamId);
  const prev = DATA.filter(r => r.ym === prevYm && r.team === teamId);
  const rows = SERVICES.map(s => {
    const v  = cur.filter(r => r.svc === s.id).reduce((a, r) => a + r.cost, 0);
    const pv = prev.filter(r => r.svc === s.id).reduce((a, r) => a + r.cost, 0);
    return { id: s.id, name: s.name, cat: s.cat, v, d: !pv ? 0 : ((v - pv) / pv * 100) };
  }).filter(r => r.v > 0).sort((a, b) => b.v - a.v);
  tbodyEl.innerHTML = rows.map(r => {
    const owner = SERVICE_OWNERS[r.id];
    const util = UTILIZATION[r.id];
    const utilPct = util?.total ? Math.round(util.used / util.total * 100) : null;
    return '<tr>' +
      '<td><strong>' + r.name + '</strong>' +
      (owner ? '<div style="font-size:9px;color:var(--c-text-muted)">' + owner.owner + ' · ' + owner.approver + '</div>' : '') +
      '</td>' +
      '<td><span class="badge ' + (CAT_BADGE[r.cat] || '') + '">' + r.cat + '</span></td>' +
      '<td style="text-align:right;font-weight:600">' + fmt(r.v) + '</td>' +
      '<td style="text-align:right;color:' + (r.d > 0 ? T.accent : T.positive) + '">' + (r.d > 0 ? '▲' : '▼') + ' ' + Math.abs(r.d).toFixed(1) + '%</td>' +
      (utilPct !== null ? '<td style="text-align:right;font-size:10px;color:' + (utilPct < 70 ? T.accent : T.positive) + '">' + utilPct + '%</td>' : '<td style="text-align:right;font-size:10px;color:var(--c-text-muted)">API</td>') +
      '</tr>';
  }).join('') || '<tr><td colspan="5" style="text-align:center;color:var(--c-text-muted);padding:16px">데이터 없음</td></tr>';

  const insightEl = document.getElementById('drill-insight');
  if (insightEl) {
    const teamTotal = rows.reduce((a,r)=>a+r.v,0);
    const top2 = rows.slice(0,2);
    insightEl.textContent = top2.length > 0
      ? top2.map(r => r.name + ' ' + (teamTotal>0?(r.v/teamTotal*100).toFixed(0):'0') + '%').join(' · ') + ' — 이 팀 비용의 주요 원인'
      : '이 팀의 이번 달 구독 데이터 없음';
  }
  // Option C: team mini-simulator
  const miniSimEl = document.getElementById('team-mini-sim');
  if (miniSimEl) {
    const top4 = rows.slice(0, 4);
    const teamTotal = rows.reduce((a,r)=>a+r.v,0);
    miniSimEl.innerHTML =
      '<div style="margin-top:12px;padding-top:12px;border-top:1px solid var(--c-border)">' +
      '<div style="font-size:12px;font-weight:600;margin-bottom:2px">이 팀 비용을 줄이려면?</div>' +
      '<div style="font-size:10px;color:var(--c-text-dim);margin-bottom:8px">상위 서비스 조정 (-50~0%)</div>' +
      top4.map(r =>
        '<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">' +
        '<div style="flex:0 0 76px;font-size:10px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis" title="'+r.name+'">'+r.name+'</div>' +
        '<input type="range" id="tsim-'+r.id+'" class="sim-slider" min="-50" max="0" value="0" style="flex:1" oninput="updateTeamSim(\''+teamId+'\')">' +
        '<span id="tsim-pct-'+r.id+'" style="flex:0 0 28px;text-align:right;font-size:10px;color:var(--c-text-dim)">0%</span>' +
        '</div>'
      ).join('') +
      '<div style="font-size:11px;margin-top:4px;color:var(--c-text-dim)">조정 후: <strong id="tsim-total">'+fmt(teamTotal)+'</strong></div>' +
      '</div>';
  }
}

function renderTeams() {
  const base = getFilteredBase();
  const cur  = base.filter(r => r.ym === curYm);

  const yoy  = base.filter(r => r.ym === curYoy);
  const teamColors = THEMES[currentTheme].teamColors;
  const totalHeadcount = TEAMS.reduce((a, t) => a + t.headcount, 0);
  const totalCur = sumBy(cur, 'cost');
  const teamData = TEAMS.map(t => ({
    label: t.name, id: t.id,
    v:  sumBy(cur.filter(r => r.team === t.id), 'cost'),
    pv: sumBy(prev.filter(r => r.team === t.id), 'cost'),
    yv: sumBy(yoy.filter(r => r.team === t.id), 'cost'),
    headcount: t.headcount
  })).sort((a, b) => b.v - a.v);
  const perHeadAvg = Math.round(totalCur / totalHeadcount);
  const sorted4ph = [...teamData].sort((a,b) => (b.v/b.headcount) - (a.v/a.headcount));
  const highestPH = sorted4ph[0];
  const lowestPH  = sorted4ph[sorted4ph.length - 1];
  const perHeadGap = ((highestPH.v / highestPH.headcount) / (lowestPH.v / lowestPH.headcount)).toFixed(1);
  const teamHistData = TEAMS.map((t, ti) => ({
    color: teamColors[ti], label: t.name,

function renderCost() {
  const base = getFilteredBase();
  const cur  = base.filter(r => r.ym === curYm);
  const prev = base.filter(r => r.ym === prevYm);
  const yoy  = base.filter(r => r.ym === curYoy);
  const totalCur  = sumBy(cur, 'cost');
  const totalPrev = sumBy(prev, 'cost');
  const totalYoy  = sumBy(yoy, 'cost');
  const momPct = delta(totalCur, totalPrev);
  const yoyPct = delta(totalCur, totalYoy);
  const trendData = MONTHS.map(m => ({ label: m.ym, v: sumBy(base.filter(r => r.ym === m.ym), 'cost') }));
  const aiCur   = sumBy(cur.filter(r => SERVICES.find(s => s.id === r.svc)?.cat === 'AI도구'), 'cost');
  const cloudCur = sumBy(cur.filter(r => SERVICES.find(s => s.id === r.svc)?.cat === '클라우드'), 'cost');
  const aiFirst = sumBy(base.filter(r => r.ym === '2024-01' && SERVICES.find(s => s.id === r.svc)?.cat === 'AI도구'), 'cost');
  const aiGrowth18m = delta(aiCur, aiFirst);
  const now = new Date('2025-06-01');
  const optItems = SERVICES.map(s => {
    const v  = sumBy(cur.filter(r => r.svc === s.id), 'cost');
    const pv = sumBy(prev.filter(r => r.svc === s.id), 'cost');
    const bv = BUDGETS[s.id] || 0;
    const expiryStr = EXPIRY[s.id] || '';
    let expiryMonths = null;
    if (expiryStr) {
      const [ey, em] = expiryStr.split('-').map(Number);
      expiryMonths = (ey - now.getFullYear()) * 12 + (em - (now.getMonth() + 1));
    }
    const d = delta(v, pv);
    const budgetPct = bv ? ((v / bv) * 100).toFixed(0) : null;
    let action;
    if (d > 25)       action = '즉시 계약 재협상';
    else if (d > 15)  action = '담당팀 보고 요청';
    else if (d > 5)   action = '다음 분기 검토';
    else              action = null;
    return { id: s.id, name: s.name, cat: s.cat, v, d, budgetPct, expiryMonths, expiryStr, action };
  }).filter(s => s.action !== null).sort((a, b) => b.d - a.d);
  const optRows = optItems.slice(0, 8).map(s => {
    const expBadge = s.expiryMonths !== null && s.expiryMonths <= 3
      ? `<span style="margin-left:4px;background:#ef7d86;color:#fff;border-radius:3px;padding:1px 5px;font-size:10px;font-weight:700">만료임박</span>` : '';
    const budgetCell = s.budgetPct ? `<span style="color:${parseInt(s.budgetPct)>100?T.accent:'inherit'}">${s.budgetPct}%</span>` : '—';
    const actionColor = s.d > 25 ? T.accent : s.d > 15 ? '#efb05d' : 'var(--c-text-dim)';
    return `<tr${s.d > 25 ? ' style="background:rgba(232,0,13,0.025)"' : ''}>
      <td><strong>${s.name}</strong>${expBadge}</td>
      <td><span class="badge ${CAT_BADGE[s.cat]}">${s.cat}</span></td>
      <td style="text-align:right;font-weight:600">${fmt(s.v)}</td>
      <td style="text-align:right;color:${T.accent}">▲ ${s.d.toFixed(1)}%</td>
      <td style="text-align:right">${budgetCell}</td>
      <td style="text-align:right">${s.expiryStr || '—'}</td>
      <td style="color:${actionColor};font-size:11px;font-weight:${s.d>25?'700':'400'}">${s.action}</td>
    </tr>`;
  }).join('');
  const costConsec = (() => { let c = 0; for (let i = trendData.length-1; i>0; i--) { if(trendData[i].v>trendData[i-1].v) c++; else break; } return c; })();
  const aiCostPct = (aiCur / totalCur * 100).toFixed(0);
  const cloudCostPct = (cloudCur / totalCur * 100).toFixed(0);
  const urgentCnt = optItems.filter(s => s.d > 25).length;
  const moderateCnt = optItems.filter(s => s.d > 15 && s.d <= 25).length;
  return `
  <div class="page-header">
    <div class="page-header-top">
      <div><div class="page-title">비용분석</div><div class="page-subtitle">구독비용 트렌드 · AI vs 클라우드 · 계약 재검토 대상</div></div>
      <div class="page-refresh">${DATA_UPDATE_LABEL}</div>
    </div>
  </div>
  <div class="page-body">
    <div class="kpi-row">
      <div class="kpi-main">
        <div class="kpi-label">이번 달 총비용</div>
        <div class="kpi-value">${fmt(totalCur)}</div>
        <div class="kpi-delta ${momPct > 0 ? 'up' : 'down'}">${deltaHtml(momPct)} MoM &nbsp;|&nbsp; <span style="color:${yoyPct>0?T.accent:T.positive}">${yoyPct>0?'▲':'▼'} ${Math.abs(yoyPct).toFixed(1)}%</span> YoY</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">AI 도구 vs 클라우드 비중</div>
        <div class="kpi-value" style="font-size:16px;">${(aiCur/totalCur*100).toFixed(0)}% vs ${(cloudCur/totalCur*100).toFixed(0)}%</div>
        <div class="kpi-sub">AI 18개월 성장 ${aiGrowth18m.toFixed(0)}%</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">즉시 재검토 필요</div>
        <div class="kpi-value">${optItems.filter(s => s.d > 25).length}개</div>
        <div class="kpi-sub">MoM 25%↑ 서비스</div>
      </div>
    </div>
    <div class="chart-card primary" style="margin-bottom:20px;">
      <div class="chart-title">비용이 계절적 패턴을 따르는가, 구조적으로 증가 중인가?</div>
      <div class="chart-subtitle">월간 총 구독비용 추이 2024.01 — 2025.06</div>
      ${ci(costConsec >= 3 ? costConsec + '개월 연속 상승 확인 → 계절성 아닌 구조적 증가 패턴으로 판단됨' : momPct > 0 ? '이번 달 MoM +' + momPct.toFixed(1) + '% 상승이나 연속성 없어 일시적 변동 가능' : '이번 달 MoM ' + momPct.toFixed(1) + '% 하락, 상승 중단 여부 모니터링 필요')}
      ${areaChart([{ color: T.accent, data: trendData }], 900, 160)}
    </div>
    <div class="chart-grid col-2" style="margin-bottom:20px;">
      <div class="chart-card">
        <div class="chart-title">클라우드 vs AI 투자 비중이 전략 방향에 부합하는가?</div>
        <div class="chart-subtitle">카테고리별 이번 달 비용 구성</div>
        ${ci('현재 AI ' + aiCostPct + '% · 클라우드 ' + cloudCostPct + '% · ' + (aiCur > cloudCur ? 'AI가 클라우드를 이미 초과 — AI 전환 기조 반영됨' : '클라우드가 여전히 우세 — AI 비중 확대 추세 모니터링 필요'))}
        ${hBarChart(CATEGORIES.map(cat=>({
          label:cat,
          v:sumBy(cur.filter(r=>SERVICES.find(s=>s.id===r.svc)?.cat===cat),'cost'),
          color:CAT_COLORS[cat]
        })).sort((a,b)=>b.v-a.v), 380)}
      </div>
      <div class="chart-card">
        <div class="chart-title">AI 도입 1.5년, 투자 대비 성과 측정 기준점에 도달했는가?</div>
        <div class="chart-subtitle">AI 도구 카테고리 월간 비용 2024.01 — 2025.06</div>
        ${ci('18개월 AI 누적 성장 ' + (aiGrowth18m>=0?'+':'') + aiGrowth18m.toFixed(0) + '% · 현재 월 ' + fmt(aiCur) + ' → 투자 대비 성과 측정 기준점 수립 시점')}
        ${areaChart([{
          color: T.accent,
          data: MONTHS.map(m=>({label:m.ym, v:sumBy(base.filter(r=>r.ym===m.ym&&SERVICES.find(s=>s.id===r.svc)?.cat==='AI도구'),'cost')}))
        }], 380, 160)}
      </div>
    </div>
    <div class="chart-card">
      <div class="chart-title">지금 당장 계약 재검토가 필요한 서비스는 무엇인가?</div>
      <div class="chart-subtitle">MoM 5%↑ 서비스 · 빨강=즉시 재협상(25%↑) · 노랑=팀 보고(15%↑) · 회색=다음 분기</div>
      ${ci('즉시 재협상(25%↑) ' + urgentCnt + '개 · 팀 보고(15~25%↑) ' + moderateCnt + '개 포함 총 ' + optItems.length + '개 서비스 재검토 대상 — 이번 달 내 조치 권고')}
      <table class="data-table">
        <thead><tr>
          <th>서비스</th><th>카테고리</th>
          <th style="text-align:right">이번 달 비용</th>
          <th style="text-align:right">MoM</th>
          <th style="text-align:right">예산 대비</th>
          <th style="text-align:right">계약 만료</th>
          <th>권고사항</th>
        </tr></thead>
        <tbody>${optRows || `<tr><td colspan="7" style="text-align:center;color:var(--c-text-muted);padding:20px">최적화 대상 없음</td></tr>`}</tbody>
      </table>
      ${optItems.length > 0 ? `<div style="margin-top:16px;padding-top:14px;border-top:2px solid var(--c-border)">
        <div class="chart-title" style="font-size:13px">빠른 절감 시뮬레이션</div>
        <div class="chart-subtitle" style="margin-bottom:10px">재검토 대상 서비스 협상 시뮬레이션 (-50~0%)</div>
        ${optItems.slice(0,8).map(s =>
          '<div style="display:flex;align-items:center;gap:10px;padding:4px 0;border-bottom:1px solid var(--c-border-sub)">' +
          '<div style="flex:0 0 100px;font-size:11px;font-weight:600;overflow:hidden;white-space:nowrap;text-overflow:ellipsis">' + s.name + '</div>' +
          '<input type="range" id="csim-' + s.id + '" class="sim-slider" min="-50" max="0" value="0" oninput="updateCostSim()" style="flex:1">' +
          '<span id="csim-pct-' + s.id + '" style="flex:0 0 30px;text-align:right;font-size:11px;color:var(--c-text-dim)">0%</span>' +
          '<span style="flex:0 0 72px;text-align:right;font-size:11px;color:var(--c-text-dim)">' + fmt(s.v) + '</span>' +
          '</div>'
        ).join('')}
        <div style="margin-top:10px;font-size:12px;color:var(--c-text-dim)">
          절감 적용 후 총비용: <strong id="cost-sim-after">${fmt(totalCur)}</strong>
          &nbsp;&nbsp; 절감액: <strong id="cost-sim-savings" style="color:var(--c-positive)">₩ 0</strong>
        </div>
      </div>` : ''}
    </div>
  </div>`;
}

// ─── NAVIGATION ──────────────────────────────────────────────────
function navigate(tab) {
  state.tab = tab;
  document.querySelectorAll('.sb-nav-item').forEach(el =>
    el.classList.toggle('active', el.dataset.tab === tab)
  );
  renderPage();
}

function renderPage() {
  const el = document.getElementById('page-content');
  switch (state.tab) {
    case 'overview': el.innerHTML = renderOverview(); break;
    case 'services': el.innerHTML = renderServices(); break;
    case 'teams':
      el.innerHTML = renderTeams();
      {
        const _cur = DATA.filter(r => r.ym === curYm);
        const _topId = TEAMS.map(t => ({ id: t.id, v: _cur.filter(r => r.team === t.id).reduce((a,r) => a+r.cost,0) }))
          .sort((a,b) => b.v - a.v)[0]?.id;
        selectTeamDrill(drillTeam || _topId);
      }
      break;
    case 'cost':     el.innerHTML = renderCost();     break;
    case 'sim':      el.innerHTML = renderSimulation(); break;
  }
}

// Init
buildThemeSwitcher();
document.body.dataset.concept = THEMES[currentTheme].concept || 'flat';
renderPage();
</script>
</body>
</html>
